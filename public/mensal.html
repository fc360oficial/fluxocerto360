<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Cronograma Mensal — FC360</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08111F;--bg2:#0B1220;--card:#121B2E;--card2:#172033;
  --brand:#FACC15;--green:#22C55E;--green-bg:rgba(34,197,94,.12);
  --red:#EF4444;--red-bg:rgba(239,68,68,.12);
  --text:#FFFFFF;--text2:#94A3B8;--text3:#64748B;
  --border:rgba(255,255,255,.06);--border-md:rgba(255,255,255,.10);
  --radius:16px;--radius-sm:10px;
  --font:'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden}
body{display:flex;flex-direction:column;height:100vh}
.brand-bar{height:40px;flex-shrink:0;background:#FACC15;display:flex;align-items:center;justify-content:center;position:relative;z-index:200}
.brand-bar .b-name{font-size:15px;font-weight:900;letter-spacing:.35em;text-transform:uppercase;color:#0a0e18}
.brand-bar .b-right{position:absolute;right:20px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:12px}
.brand-bar .b-slide{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(10,14,24,.5)}
.brand-bar .b-live{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(10,14,24,.45)}
.brand-bar .b-live-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;animation:bpulse 2s infinite}
@keyframes bpulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── HEADER ── */
.header{
  background:linear-gradient(180deg,rgba(18,27,46,.98),rgba(18,27,46,.94));
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border-md);
  padding:0 20px;height:64px;display:flex;align-items:center;gap:16px;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 4px 24px rgba(0,0,0,.4);flex-shrink:0;
}
.h-left{display:flex;align-items:center;gap:10px}
.h-logo{height:40px;filter:brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(-8deg)}
.h-kpis{display:flex;align-items:center;gap:8px;flex:1;justify-content:center}
.h-kpis .res-item{min-width:40px}
.h-kpis .res-num{font-size:16px;font-weight:900}
.h-kpis .res-lbl{font-size:8px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase}
.h-kpis .res-sep{height:22px}
.h-title{font-size:15px;font-weight:800;color:var(--brand);letter-spacing:2px;text-transform:uppercase}
.h-sub{font-size:11px;color:var(--text3);letter-spacing:1px;margin-top:2px}
.h-back{display:flex;align-items:center;gap:7px;color:var(--text2);text-decoration:none;
  font-size:12px;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--border-md);background:rgba(255,255,255,.04);transition:all .2s}
.h-back:hover{color:var(--brand);border-color:rgba(250,204,21,.3)}

/* Nome comprador — igual comprador.html */
.h-compradora{display:flex;align-items:center;gap:14px}
.h-avatar{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;
  box-shadow:0 4px 16px rgba(0,0,0,.4);flex-shrink:0;
}
.h-info h2{font-size:22px;font-weight:800;letter-spacing:.3px;color:var(--text)}
.h-info p{font-size:11px;color:var(--text2);letter-spacing:1.2px;text-transform:uppercase;margin-top:2px;font-weight:500}
/* Relógio — igual comprador.html */
.h-clock{display:none}
.clock-time{font-size:52px;font-weight:800;color:#fff;letter-spacing:3px;font-variant-numeric:tabular-nums;line-height:1}
.clock-sub{font-size:11px;color:var(--text2);margin-top:2px;text-align:right;font-weight:500}

/* ── MÊS NAV ── */
.mes-nav{display:none}
.mes-btn{background:rgba(255,255,255,.06);border:1px solid var(--border-md);
  color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer;
  font-size:13px;font-weight:700;transition:all .2s}
.mes-btn:hover{background:rgba(250,204,21,.1);border-color:rgba(250,204,21,.3);color:var(--brand)}
.mes-label{font-size:14px;font-weight:800;color:var(--text);letter-spacing:1px;min-width:130px;text-align:center}

/* ── MAIN ── */
main{flex:1;padding:6px 16px;overflow:hidden;display:flex;flex-direction:column}

/* ── CARROSSEL ── */
.scroll-wrap{flex:1;overflow:hidden;position:relative}
#conteudo{will-change:transform}

/* ── LAYOUT DOIS GRUPOS ── */
.grupos-wrap{display:flex;gap:0}
.grupo-col{flex:1;min-width:0;padding:0 12px}
.grupo-col:first-child{padding-left:0}
.grupo-col:last-child{padding-right:0}
.grupo-divider{width:2px;background:rgba(255,255,255,.1);flex-shrink:0}
.grupo-header{
  font-size:15px;font-weight:900;color:var(--brand);letter-spacing:2px;
  text-transform:uppercase;padding:6px 0 8px;border-bottom:2px solid rgba(250,204,21,.4);
  margin-bottom:6px;
}

/* Título por dia */
.dia-titulo{
  padding:8px 0 3px;font-size:13px;font-weight:900;
  color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;
  border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:2px;margin-top:10px;
}

/* Tabelas */
table{border-collapse:collapse;width:100%}

/* Cabeçalho de semana */
.semana-header th{
  padding:4px 6px;font-size:12px;font-weight:700;color:var(--text3);
  text-align:center;border-bottom:1px solid var(--border);line-height:1.4;
}
.semana-header th.col-nome{text-align:left;padding-left:0}

/* Linhas de fornecedor */
.forn-linha td{
  padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.04);
  font-size:14px;vertical-align:middle;
}
.forn-linha:hover td{background:rgba(255,255,255,.04)}
.forn-linha td.col-nome{
  font-weight:600;color:var(--text);padding-left:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Badges de código */
.badge-lista{
  display:inline-block;font-size:11px;font-weight:800;
  background:#1e3a5f;color:#60a5fa;border-radius:3px;
  padding:1px 5px;margin-right:5px;vertical-align:middle;
}
.badge-fornec{
  display:inline-block;font-size:11px;font-weight:800;
  background:#1a3a2a;color:#4ade80;border-radius:3px;
  padding:1px 5px;margin-right:5px;vertical-align:middle;
}

/* Status cells */
.cell{
  text-align:center;border-radius:5px;padding:4px 10px;
  font-size:16px;font-weight:800;white-space:nowrap;display:block;
}
.cell.ok  {background:var(--green-bg);color:var(--green)}
.cell.pend{background:var(--red-bg);color:var(--red)}
.cell.fut {color:rgba(255,255,255,.2);font-size:14px}

/* Sub-data no cabeçalho */
.data-sub{font-size:10px;font-weight:400;opacity:.7;display:block}

/* Total row */
.total-row td{
  padding:3px 6px;font-size:11px;color:var(--text3);
  border-top:1px solid var(--border);border-bottom:2px solid var(--border-md);
}
.total-row td.col-nome{padding-left:0;font-weight:700;color:var(--text2)}
.total-cell{text-align:center;font-weight:700;font-size:13px}
.total-cell.ok{color:var(--green)}
.total-cell.mix{color:var(--brand)}
.total-cell.pend{color:var(--red)}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}

/* Resumo topo */
.resumo-bar{
  display:flex;align-items:center;gap:16px;margin-bottom:8px;
  background:var(--card);border:1px solid var(--border-md);
  border-radius:var(--radius-sm);padding:7px 14px;
}
.res-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.res-num{font-size:18px;font-weight:900}
.res-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.res-sep{width:1px;height:26px;background:var(--border-md)}
.res-item.ok .res-num{color:var(--green)}
.res-item.pend .res-num{color:var(--red)}
.res-item.total .res-num{color:var(--brand)}
</style>
</head>

let mesSel = new Date().getMonth() + 1;
let anoSel = new Date().getFullYear();
let nomeSel = 'FATIMA';
let fornecMap = {};
let pedidosMes = {};

function mudarMes(delta) {
  mesSel += delta;
  if (mesSel > 12) { mesSel = 1; anoSel++; }
  if (mesSel < 1)  { mesSel = 12; anoSel--; }
  carregar();
}

function isoDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDia(iso) {
  const [,, d] = iso.split('-'); return d + '/' + iso.split('-')[1];
}

function ocorrencias(mes, ano, weekday) {
  const datas = [];
  const d = new Date(ano, mes - 1, 1);
  while (d.getMonth() === mes - 1) {
    if (d.getDay() === weekday) datas.push(isoDate(new Date(d)));
    d.setDate(d.getDate() + 1);
  }
  return datas;
}

// Mesma lógica do comprador.html histórico: pedidos-hoje?data=DATE por data específica
async function carregarPedidos() {
  const cron = COMPRADORES[nomeSel];
  if (!cron) return;

  // Coleta todas as datas agendadas no mês
  const datesSet = new Set();
  for (const grupo of ['1e3','2e4']) {
    for (const dia of ['SEG','TER','QUA','QUI','SEX']) {
      const itens = cron[grupo]?.[dia] || [];
      if (!itens.length) continue;
      ocorrencias(mesSel, anoSel, DIA_IDX[dia]).forEach(d => datesSet.add(d));
    }
  }

  pedidosMes = {};
  // Busca igual ao histórico da semana do comprador.html — uma chamada por data
  await Promise.all([...datesSet].map(async dateISO => {
    try {
      const r = await fetch('/api/compras/pedidos-hoje?data=' + dateISO);
      if (r.ok) {
        const { concluidos } = await r.json();
        if (concluidos?.length) pedidosMes[dateISO] = concluidos.map(c => parseInt(c));
      }
    } catch(_) {}
  }));
}

async function carregar() {
  document.getElementById('conteudo').innerHTML = '<div class="loading">Carregando…</div>';
  document.getElementById('mes-label').textContent = MESES[mesSel] + ' ' + anoSel;

  const cron = COMPRADORES[nomeSel];
  if (!cron) return;

  // Carrega fornecMap — coleta nRegs de todos os grupos
  const todosNRegs = [];
  for (const grupo of Object.values(cron))
    for (const itens of Object.values(grupo))
      for (const f of itens)
        if (!todosNRegs.includes(f.nReg)) todosNRegs.push(f.nReg);
  try {
    const r = await fetch('/api/compras/fornec-por-lista?listas=' + todosNRegs.join(','));
    if (r.ok) fornecMap = await r.json();
  } catch(_) {}

  await carregarPedidos();
  renderTabela(cron);
}

// Atualiza só os pedidos do banco e re-renderiza — mesma regra do comprador.html
async function atualizarStatus() {
  const cron = COMPRADORES[nomeSel];
  if (!cron) return;
  await carregarPedidos();
  renderTabela(cron);
}

// Determina grupo pela posição de ocorrência: 1ª/3ª = '1e3', 2ª/4ª = '2e4'
function grupoOcorrencia(occIdx) {
  return occIdx % 2 === 0 ? '1e3' : '2e4';
}

// Igual ao comprador.html histórico: verifica pedidosMes[data] por CodFornec
// pedidosMes é carregado via pedidos-hoje?data=DATE por cada data do cronograma
function pedidoFeito(codFornec, dateISO) {
  if (!codFornec) return false;
  const cod = parseInt(codFornec);
  // Verifica data exata (mesma regra do histórico)
  if ((pedidosMes[dateISO] || []).includes(cod)) return true;
  // Fallback: qualquer dia da mesma semana (pedido aprovado em dia diferente do agendado)
  const [y, m, day] = dateISO.split('-').map(Number);
  const d = new Date(y, m - 1, day);
  const dow = d.getDay();
  const diffSeg = dow === 0 ? -6 : 1 - dow;
  const seg = new Date(d); seg.setDate(d.getDate() + diffSeg);
  const sex = new Date(seg); sex.setDate(seg.getDate() + 4);
  const monISO = isoDate(seg), friISO = isoDate(sex);
  for (const [dt, cods] of Object.entries(pedidosMes)) {
    if (dt >= monISO && dt <= friISO && cods.includes(cod)) return true;
  }
  return false;
}

// Retorna as datas do mês para um dia da semana, filtradas pelo grupo (1e3 ou 2e4)
function ocorrenciasPorGrupo(weekday, grupo) {
  const todos = ocorrencias(mesSel, anoSel, weekday);
  return todos.reduce((acc, d, i) => {
    if (grupo === '1e3' ? i % 2 === 0 : i % 2 === 1) acc.push({ data: d, num: i + 1 });
    return acc;
  }, []);
}

function buildGrupoHTML(cron, grupo) {
  const hoje = isoDate(new Date());
  const diasOrdem = ['SEG','TER','QUA','QUI','SEX'];
  let h = '';
  let gOk = 0, gPend = 0, gFut = 0;

  for (const dia of diasOrdem) {
    const itens = cron[grupo]?.[dia] || [];
    if (!itens.length) continue;

    const weekday = DIA_IDX[dia];
    const datasGrupo = ocorrenciasPorGrupo(weekday, grupo);
    if (!datasGrupo.length) continue;

    const N = datasGrupo.length;
    const W = 48; // largura fixa de cada coluna de semana (px)

    h += `<div class="dia-titulo">${DIAS_LABEL[dia]}</div>`;
    h += `<table style="table-layout:fixed;width:100%">`;
    h += `<colgroup><col>${datasGrupo.map(() => `<col style="width:${W}px">`).join('')}</colgroup>`;
    h += `<tr class="semana-header"><th class="col-nome">Fornecedor</th>`;
    datasGrupo.forEach(({data, num}) => {
      h += `<th>${num}ª<span class="data-sub">${fmtDia(data)}</span></th>`;
    });
    h += '</tr>';

    const tots = Array(N).fill(0).map(() => ({ok:0,pend:0,fut:0}));

    for (const f of itens) {
      const codFornec = fornecMap[String(f.nReg)]?.codFornec;
      const badgeLista  = `<span class="badge-lista" title="Lista">${f.nReg}</span>`;
      const badgeFornec = codFornec && String(codFornec) !== String(f.nReg)
        ? `<span class="badge-fornec" title="Cód. Fornecedor">${codFornec}</span>` : '';
      h += `<tr class="forn-linha"><td class="col-nome" title="${f.nome}">${badgeLista}${badgeFornec}${f.nome}</td>`;
      datasGrupo.forEach(({data}, i) => {
        const futura = data > hoje;
        const ok = !futura && pedidoFeito(codFornec, data);
        if (futura)    { tots[i].fut++;  gFut++;  h += `<td><div class="cell fut">—</div></td>`; }
        else if (ok)   { tots[i].ok++;   gOk++;   h += `<td><div class="cell ok">✓</div></td>`; }
        else           { tots[i].pend++; gPend++; h += `<td><div class="cell pend">✗</div></td>`; }
      });
      h += '</tr>';
    }

    // linha de total
    h += `<tr class="total-row"><td class="col-nome">Total</td>`;
    tots.forEach(t => {
      const cls = t.pend===0&&t.fut===0?'ok':t.ok>0?'mix':'pend';
      const txt = t.fut>0 ? `${t.ok}/${t.ok+t.pend+t.fut}` : `${t.ok}/${t.ok+t.pend}`;
      h += `<td class="total-cell ${cls}">${txt}</td>`;
    });
    h += '</tr></table>';
  }

  return { html: h, ok: gOk, pend: gPend, fut: gFut };
}

function renderTabela(cron) {
  const g1 = buildGrupoHTML(cron, '1e3');
  const g2 = buildGrupoHTML(cron, '2e4');
  const totalOk   = g1.ok   + g2.ok;
  const totalPend = g1.pend + g2.pend;
  const totalFut  = g1.fut  + g2.fut;

  document.getElementById('conteudo').innerHTML = `
    <div class="grupos-wrap">
      <div class="grupo-col">
        <div class="grupo-header">1ª e 3ª Semanas</div>
        ${g1.html}
      </div>
      <div class="grupo-divider"></div>
      <div class="grupo-col">
        <div class="grupo-header">2ª e 4ª Semanas</div>
        ${g2.html}
      </div>
    </div>
  `;

  const resumoEl = document.getElementById('resumo');
  resumoEl.innerHTML = `
    <div class="res-item total"><div class="res-num">${totalOk+totalPend+totalFut}</div><div class="res-lbl">Total</div></div>
    <div class="res-sep"></div>
    <div class="res-item ok"><div class="res-num">${totalOk}</div><div class="res-lbl">Concluídos</div></div>
    <div class="res-sep"></div>
    <div class="res-item pend"><div class="res-num">${totalPend}</div><div class="res-lbl">Pendentes</div></div>
    <div class="res-sep"></div>
    <div class="res-item fut"><div class="res-num" style="color:var(--text3)">${totalFut}</div><div class="res-lbl">Futuros</div></div>
  `;

  document.getElementById('h-nome').textContent = nomeSel;
  const bc = document.getElementById('brand-comprador');

  document.getElementById('h-sub').textContent = `${MESES[mesSel]} ${anoSel}`;

  av.style.color = cor;
  av.textContent = nomeSel[0];

  iniciarCarrossel();
}

// ── CARROSSEL VERTICAL ────────────────────────────────
let _carraf = null;
let _scrollY = 0;
const PX_POR_FRAME = 0.4; // ~24px/s em 60fps — ajustável

function fitContent() {
  const wrap = document.getElementById('scroll-wrap');
  const el = document.getElementById('conteudo');
  if (!wrap || !el) return false;
  el.style.zoom = '';
  const avail = wrap.clientHeight;
  const content = el.scrollHeight;
  if (content > avail && avail > 50) {
    const ratio = avail / content;
    if (ratio >= 0.55) {
      el.style.zoom = ratio.toFixed(3);
      return true;
    }
  }
  return content <= avail;
}

function iniciarCarrossel() {
  if (_carraf) { cancelAnimationFrame(_carraf); _carraf = null; }
  _scrollY = 0;
  const el = document.getElementById('conteudo');
  if (!el) return;

  if (fitContent()) return;

  // Duplicar conteúdo para loop sem pulo
  const original = el.innerHTML;
  el.innerHTML = original + '<div style="height:40px"></div>' + original;
  el.style.transform = 'translateY(0)';

  const wrap = document.getElementById('scroll-wrap');

  function step() {
    _scrollY += PX_POR_FRAME;
    const metade = el.scrollHeight / 2;
    if (_scrollY >= metade) _scrollY = 0; // loop suave
    el.style.transform = `translateY(-${_scrollY}px)`;
    _carraf = requestAnimationFrame(step);
  }
  // Pausa 2s antes de começar a rolar
  setTimeout(() => { _carraf = requestAnimationFrame(step); }, 2000);
}

// Init
const params = new URLSearchParams(location.search);
// Remove acentos para busca no COMPRADORES (chaves sem acento)
function semAcento(s) { return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toUpperCase(); }
nomeSel = semAcento(params.get('nome') || 'FATIMA');
if (params.get('mes')) mesSel = parseInt(params.get('mes'));
if (params.get('ano')) anoSel = parseInt(params.get('ano'));

// Rotação automática
const ORDEM_AUTO = ['FATIMA','KELLY','STHEPHANNY','CRISLANE','PATRICIA'];
const isAuto   = params.get('auto') === '1';
const idxAtual = parseInt(params.get('idx') || '0');

if (isAuto) {
  let cdAuto = 60;
  const barEl = document.createElement('div');
  barEl.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:rgba(8,17,31,.92);' +
    'border-top:1px solid rgba(255,255,255,.08);padding:8px 28px;display:flex;align-items:center;' +
    'justify-content:flex-end;font-size:11px;color:#64748b;font-family:inherit;z-index:200';
  barEl.innerHTML = 'Próxima tela em <span id="cd-mensal" style="color:#FACC15;font-weight:800;margin-left:6px">60s</span>';
  document.body.appendChild(barEl);

  const iv = setInterval(() => {
    cdAuto--;
    const el = document.getElementById('cd-mensal');
    if (el) el.textContent = cdAuto + 's';
    if (cdAuto <= 0) {
      clearInterval(iv);
      const next = idxAtual + 1;
      if (next < ORDEM_AUTO.length) {
        location.href = '/mensal.html?nome=' + encodeURIComponent(ORDEM_AUTO[next]) + '&auto=1&idx=' + next;
      } else {
        try { window.parent.postMessage({ type: 'mensalCycleComplete' }, '*'); } catch(_) {}
        if (window.parent === window) { location.href = '/compras.html'; }
      }
    }
  }, 1000);
}

// ── MENU DE COMPRADORES ──
(function(){
  const btn  = document.getElementById('btn-menu');
  const menu = document.getElementById('slide-menu');
  const ordem = ['FATIMA','KELLY','STHEPHANNY','CRISLANE','PATRICIA'];
  const cargos = {
    FATIMA:'Alimentos',KELLY:'Frios & Laticínios',
    STHEPHANNY:'Perfumaria & Limpeza',CRISLANE:'Hortifruti & Padaria',PATRICIA:'Bebidas'
  };
  const cores = {
    FATIMA:'#6366f1',KELLY:'#f43f5e',STHEPHANNY:'#a855f7',CRISLANE:'#14b8a6',PATRICIA:'#f59e0b'
  };

  function buildMenu() {
    menu.innerHTML = ordem.map(n => {
      const ativo = n === nomeSel ? 'active' : '';
      return `<button class="slide-opt ${ativo}" onclick="irPara('${n}')">
        <span class="so-dot" style="background:${cores[n]}"></span>
        <span>${n.charAt(0)+n.slice(1).toLowerCase()}</span>
        <span style="font-size:10px;color:#64748b;margin-left:auto">${cargos[n]}</span>
      </button>`;
    }).join('');
  }

  window.irPara = function(nome) {
    menu.classList.remove('open');
    location.href = '/mensal.html?nome=' + encodeURIComponent(nome);
  };

  btn.addEventListener('click', e => {
    e.stopPropagation();
    buildMenu();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', () => menu.classList.remove('open'));
  menu.addEventListener('click', e => e.stopPropagation());

  // torna botões visíveis com opacity baixa
  [btn, document.querySelector('.btn-fs')].forEach(b => { if(b) b.style.opacity = '0.35'; });
})();

carregar();
</script>
