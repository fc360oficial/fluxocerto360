<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cronograma Mensal — FC360</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08111F;--bg2:#0B1220;--card:#121B2E;--card2:#172033;
  --brand:#FACC15;--green:#22C55E;--green-bg:rgba(34,197,94,.12);
  --red:#EF4444;--red-bg:rgba(239,68,68,.12);
  --text:#FFFFFF;--text2:#94A3B8;--text3:#64748B;
  --border:rgba(255,255,255,.06);--border-md:rgba(255,255,255,.10);
  --radius:16px;--radius-sm:10px;
  --font:'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden}
body{display:flex;flex-direction:column;height:100vh}

/* ── HEADER ── */
.header{
  background:linear-gradient(180deg,rgba(18,27,46,.98),rgba(18,27,46,.94));
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border-md);
  padding:0 28px;height:64px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 4px 24px rgba(0,0,0,.4);flex-shrink:0;
}
.h-left{display:flex;align-items:center;gap:14px}
.h-logo{height:44px;filter:brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(-8deg)}
.h-title{font-size:15px;font-weight:800;color:var(--brand);letter-spacing:2px;text-transform:uppercase}
.h-sub{font-size:11px;color:var(--text3);letter-spacing:1px;margin-top:2px}
.h-back{display:flex;align-items:center;gap:7px;color:var(--text2);text-decoration:none;
  font-size:12px;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--border-md);background:rgba(255,255,255,.04);transition:all .2s}
.h-back:hover{color:var(--brand);border-color:rgba(250,204,21,.3)}

/* ── MÊS NAV ── */
.mes-nav{display:flex;align-items:center;gap:12px}
.mes-btn{background:rgba(255,255,255,.06);border:1px solid var(--border-md);
  color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer;
  font-size:13px;font-weight:700;transition:all .2s}
.mes-btn:hover{background:rgba(250,204,21,.1);border-color:rgba(250,204,21,.3);color:var(--brand)}
.mes-label{font-size:14px;font-weight:800;color:var(--text);letter-spacing:1px;min-width:130px;text-align:center}

/* ── MAIN ── */
main{flex:1;padding:6px 16px;overflow:hidden;display:flex;flex-direction:column}

/* ── TABELA ── */
.tabela-wrap{overflow:hidden;flex:1}
table{border-collapse:collapse;width:100%;min-width:600px}

/* Título por dia */
.dia-titulo{
  padding:7px 0 2px;font-size:11px;font-weight:900;
  color:var(--brand);letter-spacing:2px;text-transform:uppercase;
  border-bottom:1px solid rgba(250,204,21,.2);margin-bottom:2px;
}

/* Cabeçalho das semanas */
.semana-header th{
  padding:3px 6px;font-size:10px;font-weight:700;color:var(--text3);
  text-align:center;white-space:nowrap;border-bottom:1px solid var(--border);
  line-height:1.3;
}
.semana-header th.col-nome{text-align:left;padding-left:0;min-width:160px}
.semana-header th.col-cat{min-width:60px;text-align:left;font-size:9px}

/* Linha do fornecedor */
.forn-linha td{
  padding:2px 6px;border-bottom:1px solid rgba(255,255,255,.03);
  font-size:12px;vertical-align:middle;
}
.forn-linha:hover td{background:rgba(255,255,255,.03)}
.forn-linha td.col-nome{
  font-weight:600;color:var(--text);padding-left:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;
}
.forn-linha td.col-cat{
  font-size:9px;color:var(--text3);font-weight:600;
  background:rgba(255,255,255,.04);border-radius:4px;text-align:center;
  padding:1px 4px;white-space:nowrap;
}

/* Células de status */
.cell{text-align:center;border-radius:5px;padding:3px 8px;font-size:13px;font-weight:800;white-space:nowrap}
.cell.ok  {background:var(--green-bg);color:var(--green)}
.cell.pend{background:var(--red-bg);color:var(--red)}
.cell.fut {color:var(--text3);font-size:12px}
.cell.vazio{color:rgba(255,255,255,.15);font-size:11px}

/* Data sub-label */
.data-sub{font-size:9px;font-weight:400;opacity:.7;display:block;margin-top:0}

/* Totalizador */
.total-row td{
  padding:2px 6px;font-size:10px;color:var(--text3);
  border-top:1px solid var(--border);border-bottom:2px solid var(--border-md);
}
.total-row td.col-nome{padding-left:0;font-weight:700;color:var(--text2)}
.total-cell{text-align:center;font-weight:700;font-size:11px}
.total-cell.ok{color:var(--green)}
.total-cell.mix{color:var(--brand)}
.total-cell.pend{color:var(--red)}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}

/* Resumo topo */
.resumo-bar{
  display:flex;align-items:center;gap:16px;margin-bottom:8px;
  background:var(--card);border:1px solid var(--border-md);
  border-radius:var(--radius-sm);padding:7px 14px;
}
.res-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.res-num{font-size:18px;font-weight:900}
.res-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.res-sep{width:1px;height:26px;background:var(--border-md)}
.res-item.ok .res-num{color:var(--green)}
.res-item.pend .res-num{color:var(--red)}
.res-item.total .res-num{color:var(--brand)}
</style>
</head>
<body>

<header class="header">
  <div class="h-left">
    <img class="h-logo" src="/logo.png" alt="Econômico">
    <div>
      <div class="h-title">Cronograma Mensal</div>
      <div class="h-sub" id="h-sub">carregando…</div>
    </div>
  </div>
  <div class="mes-nav">
    <button class="mes-btn" onclick="mudarMes(-1)">‹</button>
    <div class="mes-label" id="mes-label">—</div>
    <button class="mes-btn" onclick="mudarMes(1)">›</button>
  </div>
  <a class="h-back" href="javascript:history.back()">← Voltar</a>
</header>

<main>
  <div class="resumo-bar" id="resumo" style="display:none"></div>
  <div id="conteudo"><div class="loading">Carregando…</div></div>
</main>

<script>
const MESES = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho',
               'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS_LABEL = { SEG:'Segunda-Feira', TER:'Terça-Feira', QUA:'Quarta-Feira', QUI:'Quinta-Feira', SEX:'Sexta-Feira' };
const DIA_IDX    = { SEG:1, TER:2, QUA:3, QUI:4, SEX:5 };

// Cronograma com grupos 1e3 (semanas ímpares) e 2e4 (semanas pares)
const SEG_FATIMA = [
  {nReg:344,nome:'CAMIL ALIMENTOS S/A',cat:'Arroz'},
  {nReg:342,nome:'JOSAPAR JOAQUIM OLIVEIRA SA PART',cat:'Arroz'},
  {nReg:380,nome:'NELSON WENDT CIA LTDA',cat:'Arroz'},
  {nReg:355,nome:'URBANO AGROINDUSTRIA LTDA',cat:'Arroz'},
  {nReg:534,nome:'PANELACO ALIMENTOS LTDA',cat:'Arroz'},
  {nReg:304,nome:'JOAO MARCELO VITORINO',cat:'Arroz'},
  {nReg:537,nome:'RAMPINELLI ALIMENTOS LTDA',cat:'Arroz'},
  {nReg:415,nome:'SAO BRAZ S/A IND COM DE ALIMENTOS',cat:'Café'},
  {nReg:347,nome:'MOINHO PETINHO IND E COMERCIO LTDA',cat:'Café'},
  {nReg:332,nome:'TRES CORACOES ALIMENTOS SA',cat:'Café'},
  {nReg:314,nome:'FEIRA NOVA INDUSTRIA',cat:'Farinha'},
  {nReg:303,nome:'MONJOLO INDUSTRIA',cat:'Farinha'},
  {nReg:482,nome:'OMAR LINDEMBERG',cat:'Farinha'},
  {nReg:310,nome:'COMERCIAL DE ALIMENTOS',cat:'Feijão'},
  {nReg:312,nome:'FEIJÃO TA GOSTOSO',cat:'Feijão'},
  {nReg:311,nome:'FLAVIO Q D MORAIS',cat:'Feijão'},
  {nReg:309,nome:'OASIS ALIMENTOS',cat:'Feijão'},
  {nReg:461,nome:'PRODUTOS PEROLA',cat:'Feijão'},
  {nReg:313,nome:'SOMAR COMERCIO',cat:'Feijão'},
  {nReg:394,nome:'VALERIANO VALENTE DE OLIVEIRA',cat:'Floção'},
];
const CRON_FATIMA = {
  '1e3':{ SEG:SEG_FATIMA, TER:[{nReg:538,nome:'RONIEL J SILVA FARINHA',cat:'Farinha'}],
    QUA:[{nReg:341,nome:'ASA INDUSTRIA E COMERCIO LTDA',cat:'Laticínios'},{nReg:419,nome:'INDUSTRIA REUNIDAS CORINGA LTDA',cat:'Laticínios'},
         {nReg:384,nome:'LEITESOL INDUSTRIA E COMERCIO S/A',cat:'Laticínios'},{nReg:543,nome:'LACTALIS DO BRASIL',cat:'Laticínios'},
         {nReg:555,nome:'ALVOAR LACTEOS NORDESTE SA',cat:'Laticínios'},{nReg:350,nome:'RACA DISTRIBUICAO E LOGISTICA',cat:'Laticínios'}],
    SEX:[{nReg:277,nome:'COTAÇÃO DE ALIMENTOS',cat:'Cotação'}] },
  '2e4':{ SEG:SEG_FATIMA, TER:[{nReg:538,nome:'RONIEL J SILVA FARINHA',cat:'Farinha'}],
    QUA:[{nReg:341,nome:'ASA INDUSTRIA E COMERCIO LTDA',cat:'Laticínios'},{nReg:419,nome:'INDUSTRIA REUNIDAS CORINGA LTDA',cat:'Laticínios'},
         {nReg:384,nome:'LEITESOL INDUSTRIA E COMERCIO S/A',cat:'Laticínios'},{nReg:543,nome:'LACTALIS DO BRASIL',cat:'Laticínios'},
         {nReg:555,nome:'ALVOAR LACTEOS NORDESTE SA',cat:'Laticínios'},{nReg:350,nome:'RACA DISTRIBUICAO E LOGISTICA',cat:'Laticínios'}],
    SEX:[{nReg:277,nome:'COTAÇÃO DE ALIMENTOS',cat:'Cotação'}] },
};

const COMPRADORES = { 'FATIMA': CRON_FATIMA };

let mesSel = new Date().getMonth() + 1;
let anoSel = new Date().getFullYear();
let nomeSel = 'FATIMA';
let fornecMap = {};
let pedidosMes = {};

function mudarMes(delta) {
  mesSel += delta;
  if (mesSel > 12) { mesSel = 1; anoSel++; }
  if (mesSel < 1)  { mesSel = 12; anoSel--; }
  carregar();
}

function isoDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDia(iso) {
  const [,, d] = iso.split('-'); return d + '/' + iso.split('-')[1];
}

function ocorrencias(mes, ano, weekday) {
  const datas = [];
  const d = new Date(ano, mes - 1, 1);
  while (d.getMonth() === mes - 1) {
    if (d.getDay() === weekday) datas.push(isoDate(new Date(d)));
    d.setDate(d.getDate() + 1);
  }
  return datas;
}

async function carregar() {
  document.getElementById('conteudo').innerHTML = '<div class="loading">Carregando…</div>';
  document.getElementById('mes-label').textContent = MESES[mesSel] + ' ' + anoSel;

  const cron = COMPRADORES[nomeSel];
  if (!cron) return;

  // Carrega fornecMap — coleta nRegs de todos os grupos
  const todosNRegs = [];
  for (const grupo of Object.values(cron))
    for (const itens of Object.values(grupo))
      for (const f of itens)
        if (!todosNRegs.includes(f.nReg)) todosNRegs.push(f.nReg);
  try {
    const r = await fetch('/api/compras/fornec-por-lista?listas=' + todosNRegs.join(','));
    if (r.ok) fornecMap = await r.json();
  } catch(_) {}

  // Carrega pedidos do mês
  try {
    const r = await fetch(`/api/compras/pedidos-mes?mes=${mesSel}&ano=${anoSel}`);
    if (r.ok) { const d = await r.json(); pedidosMes = d.pedidos || {}; }
  } catch(_) {}

  renderTabela(cron);
}

// Determina grupo pela posição de ocorrência: 1ª/3ª = '1e3', 2ª/4ª = '2e4'
function grupoOcorrencia(occIdx) {
  return occIdx % 2 === 0 ? '1e3' : '2e4';
}

// Verifica se há pedido para o fornecedor em qualquer dia daquela semana (Seg-Sex)
// Igual à lógica de comprador.html — pedido pode ser aprovado em dia diferente do agendado
function pedidoNaSemana(codFornec, dateISO) {
  if (!codFornec) return false;
  const d = new Date(dateISO);
  const dow = d.getDay(); // 0=Dom,1=Seg,...,6=Sab
  const diffSeg = dow === 0 ? -6 : 1 - dow;
  const seg = new Date(d); seg.setDate(d.getDate() + diffSeg);
  const sex = new Date(seg); sex.setDate(seg.getDate() + 4);
  const monISO = isoDate(seg);
  const friISO = isoDate(sex);
  const cod = parseInt(codFornec);
  for (const [dt, cods] of Object.entries(pedidosMes)) {
    if (dt >= monISO && dt <= friISO && cods.includes(cod)) return true;
  }
  return false;
}

function renderTabela(cron) {
  const hoje = isoDate(new Date());
  let totalOk = 0, totalPend = 0, totalFut = 0;

  let html = '<div class="tabela-wrap">';

  const diasOrdem = ['SEG','TER','QUA','QUI','SEX'];

  for (const dia of diasOrdem) {
    const itens1 = cron['1e3']?.[dia] || [];
    const itens2 = cron['2e4']?.[dia] || [];
    if (itens1.length === 0 && itens2.length === 0) continue;

    const visto = new Set();
    const todosItens = [];
    for (const f of [...itens1, ...itens2]) {
      if (!visto.has(f.nReg)) { visto.add(f.nReg); todosItens.push(f); }
    }
    const nRegs1 = new Set(itens1.map(f => f.nReg));
    const nRegs2 = new Set(itens2.map(f => f.nReg));

    const weekday = DIA_IDX[dia];
    const datas = ocorrencias(mesSel, anoSel, weekday);
    const N = datas.length;

    // Tabela separada por dia — permite colgroup com widths fixas
    html += `<div class="dia-titulo">${DIAS_LABEL[dia]}</div>`;
    html += `<table style="table-layout:fixed;width:100%;margin-bottom:6px">`;
    // colgroup: nome 175px, cat 55px, restante dividido igualmente entre N data cols
    html += `<colgroup><col style="width:175px"><col style="width:55px">`;
    for (let i = 0; i < N; i++) html += `<col>`;
    html += `</colgroup>`;

    // Cabeçalho de semanas
    html += `<tr class="semana-header"><th class="col-nome">Fornecedor</th><th class="col-cat">Cat.</th>`;
    datas.forEach((dataISO, i) => {
      const g = grupoOcorrencia(i);
      html += `<th>${i+1}ª<span class="data-sub">${fmtDia(dataISO)}</span><br><span style="font-size:8px;opacity:.5">${g}</span></th>`;
    });
    html += '</tr>';

    const totaisDia = Array(N).fill(0).map(() => ({ok:0,pend:0,fut:0}));

    for (const f of todosItens) {
      const codFornec = fornecMap[String(f.nReg)]?.codFornec;
      html += `<tr class="forn-linha"><td class="col-nome" title="${f.nome}">${f.nome}</td><td class="col-cat">${f.cat}</td>`;

      datas.forEach((dataISO, i) => {
        const grupo = grupoOcorrencia(i);
        const nRegsGrupo = grupo === '1e3' ? nRegs1 : nRegs2;

        if (!nRegsGrupo.has(f.nReg)) {
          html += `<td><div class="cell vazio">·</div></td>`;
          return;
        }
        if (!codFornec) { html += '<td></td>'; return; }

        const futura = dataISO > hoje;
        const ok = !futura && pedidoNaSemana(codFornec, dataISO);

        if (futura) { totaisDia[i].fut++; totalFut++; }
        else if (ok) { totaisDia[i].ok++; totalOk++; }
        else { totaisDia[i].pend++; totalPend++; }

        if (futura) html += `<td><div class="cell fut">—</div></td>`;
        else if (ok) html += `<td><div class="cell ok">✓</div></td>`;
        else html += `<td><div class="cell pend">✗</div></td>`;
      });
      html += '</tr>';
    }

    // Total
    html += `<tr class="total-row"><td class="col-nome">Total</td><td></td>`;
    totaisDia.forEach(t => {
      const cls = t.pend === 0 && t.fut === 0 ? 'ok' : t.ok > 0 ? 'mix' : 'pend';
      const txt = t.fut > 0 ? `${t.ok}/${t.ok+t.pend+t.fut}` : `${t.ok}/${t.ok+t.pend}`;
      html += `<td class="total-cell ${cls}">${txt}</td>`;
    });
    html += '</tr></table>';
  }

  html += '</div>';
  document.getElementById('conteudo').innerHTML = html;

  // Resumo geral — fora do zoom, sempre visível em tamanho normal
  const resumoEl = document.getElementById('resumo');
  resumoEl.style.display = 'flex';
  resumoEl.innerHTML = `
    <div class="res-item total"><div class="res-num">${totalOk+totalPend+totalFut}</div><div class="res-lbl">Total</div></div>
    <div class="res-sep"></div>
    <div class="res-item ok"><div class="res-num">${totalOk}</div><div class="res-lbl">Concluídos</div></div>
    <div class="res-sep"></div>
    <div class="res-item pend"><div class="res-num">${totalPend}</div><div class="res-lbl">Pendentes</div></div>
    <div class="res-sep"></div>
    <div class="res-item fut"><div class="res-num" style="color:var(--text3)">${totalFut}</div><div class="res-lbl">Futuros</div></div>
  `;

  document.getElementById('h-sub').textContent = `${nomeSel} · ${MESES[mesSel]} ${anoSel}`;

  requestAnimationFrame(() => fitTela());
}

function fitTela() {
  const el = document.getElementById('conteudo');
  if (!el) return;
  el.style.zoom = '';
  const main = document.querySelector('main');
  if (!main) return;
  const avail = main.clientHeight - 4;
  const content = el.scrollHeight;
  if (content > avail && avail > 50) {
    el.style.zoom = Math.max(0.28, avail / content).toFixed(3);
  }
}

window.addEventListener('resize', fitTela);

// Init
const params = new URLSearchParams(location.search);
// Remove acentos para busca no COMPRADORES (chaves sem acento)
function semAcento(s) { return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toUpperCase(); }
nomeSel = semAcento(params.get('nome') || 'FATIMA');
if (params.get('mes')) mesSel = parseInt(params.get('mes'));
if (params.get('ano')) anoSel = parseInt(params.get('ano'));

// Rotação automática
const ORDEM_AUTO = ['FATIMA','FERNANDA','PRISCILA','MARCOS','RENATA'];
const isAuto   = params.get('auto') === '1';
const idxAtual = parseInt(params.get('idx') || '0');

if (isAuto) {
  let cdAuto = 40;
  const barEl = document.createElement('div');
  barEl.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:rgba(8,17,31,.92);' +
    'border-top:1px solid rgba(255,255,255,.08);padding:8px 28px;display:flex;align-items:center;' +
    'justify-content:flex-end;font-size:11px;color:#64748b;font-family:inherit;z-index:200';
  barEl.innerHTML = 'Próxima tela em <span id="cd-mensal" style="color:#FACC15;font-weight:800;margin-left:6px">40s</span>';
  document.body.appendChild(barEl);

  const iv = setInterval(() => {
    cdAuto--;
    const el = document.getElementById('cd-mensal');
    if (el) el.textContent = cdAuto + 's';
    if (cdAuto <= 0) {
      clearInterval(iv);
      const prox = idxAtual + 1;
      if (prox < ORDEM_AUTO.length) {
        location.href = '/comprador.html?nome=' + encodeURIComponent(ORDEM_AUTO[prox]) + '&auto=1&idx=' + prox;
      } else {
        try { window.parent.postMessage({ type: 'comprasCycleComplete' }, '*'); } catch(_) {}
        location.href = '/compras.html';
      }
    }
  }, 1000);
}

carregar();
</script>
</body>
</html>
