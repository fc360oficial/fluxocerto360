<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Análise de Estoque — FC360</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08111F;--bg2:#0B1220;--card:#121B2E;
  --brand:#FACC15;
  --green:#22C55E;--green-bg:rgba(34,197,94,.12);
  --amber:#F59E0B;--amber-bg:rgba(245,158,11,.12);
  --red:#EF4444;--red-bg:rgba(239,68,68,.12);
  --blue:#3B82F6;--purple:#8B5CF6;--purple-bg:rgba(139,92,246,.12);
  --text:#FFF;--text2:#94A3B8;--text3:#64748B;
  --border:rgba(255,255,255,.06);--border-md:rgba(255,255,255,.10);
  --r:14px;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* ── HEADER ── */
header{
  height:64px;padding:0 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(23,32,51,.99),rgba(18,27,46,.96));
  border-bottom:1px solid var(--border-md);
}
.h-logo{height:38px;filter:brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(-8deg)}
.h-sep{width:1px;height:30px;background:var(--border-md)}
.h-avatar{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;box-shadow:0 4px 14px rgba(0,0,0,.4);
}
.h-info h2{font-size:17px;font-weight:800}
.h-info p{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.h-spacer{flex:1}
.h-clock{display:none}
.h-clock-sub{font-size:9px;color:var(--text2);text-align:right;margin-top:2px}

/* barra progresso loja */
.loja-bar{
  flex-shrink:0;display:flex;flex-direction:column;gap:4px;align-items:flex-end;
}
.loja-bar-label{font-size:13px;font-weight:800;color:var(--brand);letter-spacing:.5px}
.loja-dots-row{display:flex;gap:5px}
.ldot{width:18px;height:4px;border-radius:2px;background:rgba(255,255,255,.08);transition:background .3s}
.ldot.done{background:rgba(250,204,21,.3)}
.ldot.ativo{background:var(--brand)}

/* view label + col atual */
.view-info{
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
}
.view-label{font-size:11px;color:var(--text3);letter-spacing:.4px}
.col-label{font-size:12px;font-weight:700;color:var(--text2)}

/* ── MAIN ── */
main{
  display:flex;gap:10px;padding:10px 16px 12px;
  height:calc(100vh - 64px);overflow:hidden;
}

/* ── COLUNA ── */
.col{
  flex:1;display:flex;flex-direction:column;
  background:var(--card);border-radius:var(--r);
  border:1.5px solid var(--border);overflow:hidden;
  opacity:.45;transition:opacity .4s,border-color .4s,box-shadow .4s;
}
.col.ativo{
  opacity:1;
  border-color:rgba(250,204,21,.35);
  box-shadow:0 0 24px rgba(250,204,21,.08);
}
.col-head{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.col-icon{font-size:15px}
.col-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;flex:1}
.col-count{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.col-body{flex:1;overflow-y:auto;scrollbar-width:none}
.col-body::-webkit-scrollbar{display:none}

/* itens */
.item-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;border-bottom:1px solid var(--border);
}
.item-row:last-child{border-bottom:none}
.item-info{flex:1;min-width:0}
.item-nome{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-cod{font-size:10px;color:var(--text3);margin-bottom:1px}
.item-meta{font-size:11px;color:var(--text2)}
.item-chip{
  flex-shrink:0;padding:3px 8px;border-radius:13px;
  font-size:11px;font-weight:700;white-space:nowrap;
}
.chip-crit{background:var(--red-bg);color:var(--red)}
.chip-alto{background:var(--amber-bg);color:var(--amber)}
.chip-med {background:rgba(255,255,255,.06);color:var(--text2)}
.chip-exc {background:var(--purple-bg);color:var(--purple)}
.chip-sem {background:rgba(100,116,139,.12);color:var(--text3)}
.chip-top {background:rgba(250,204,21,.12);color:var(--brand)}
.chip-queda{background:var(--red-bg);color:var(--red)}
.chip-custo{background:var(--red-bg);color:var(--red)}

/* bar top vendidos */
.bar-bg{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:4px}
.bar-fill{height:100%;border-radius:2px;background:var(--brand)}

/* empty */
.col-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:6px;padding:16px;text-align:center;
}
.col-empty-icon{font-size:24px}
.col-empty-txt{font-size:11px;color:var(--text3)}
</style>
</head>
<body>

<header>
  <img class="h-logo" src="/logo.png" alt="">
  <div class="h-sep"></div>
  <div class="h-avatar" id="h-avatar"></div>
  <div class="h-info">
    <h2 id="h-nome">—</h2>
    <p id="h-cargo">Compradora</p>
  </div>
  <div class="h-spacer"></div>
  <div class="view-info">
    <div class="view-label" id="view-label">—</div>
    <div class="col-label" id="col-label">—</div>
  </div>
  <div class="h-sep"></div>
  <div class="loja-bar">
    <div class="loja-bar-label" id="loja-label">LOJA 1</div>
    <div class="loja-dots-row" id="loja-dots">
      <div class="ldot ativo" data-l="1"></div>
      <div class="ldot" data-l="2"></div>
      <div class="ldot" data-l="3"></div>
      <div class="ldot" data-l="4"></div>
      <div class="ldot" data-l="5"></div>
      <div class="ldot" data-l="6"></div>
    </div>
  </div>
  <div class="h-sep"></div>
  <div>
    <div class="h-clock" id="clock">00:00:00</div>
    <div class="h-clock-sub" id="h-update"></div>
  </div>
</header>

<main id="main-cols">
</main>

<script>
const COR_COMPRADORES = {
  FATIMA:'#6366f1',FERNANDA:'#f43f5e',PRISCILA:'#14b8a6',MARCOS:'#f59e0b',RENATA:'#a855f7'
};
const CARGO_COMPRADORES = {
  FATIMA:'Compradora de Alimentos',FERNANDA:'Compradora de Higiene & Limpeza',
  PRISCILA:'Compradora de Bebidas & Frios',MARCOS:'Comprador de Hortifruti & Padaria',
  RENATA:'Compradora de Bazar & Utilidades'
};

const params = new URLSearchParams(location.search);
const NOME   = (params.get('nome')||'FATIMA').normalize('NFD').replace(/[̀-ͯ]/g,'').toUpperCase();

const LOJAS = ['1','2','3','4','5','6'];
const VIEWS = [
  { id:'abc', label:'Ruptura · Excesso · Sem Venda',
    cols:[
      { key:'ruptura',     icon:'🔴', title:'Ruptura de Estoque',  countCls:'chip-crit' },
      { key:'excesso',     icon:'🟣', title:'Excesso de Estoque',  countCls:'chip-exc'  },
      { key:'semVenda',    icon:'⬛', title:'Sem Venda 60+ dias',  countCls:'chip-sem'  },
    ]
  },
  { id:'def', label:'Top Vendidos · Queda · Custo',
    cols:[
      { key:'topVendidos', icon:'🏆', title:'Top Vendidos 30d',    countCls:'chip-top'  },
      { key:'quedaGiro',   icon:'📉', title:'Queda de Giro >30%', countCls:'chip-queda'},
      { key:'custo',       icon:'📈', title:'Variação de Custo',   countCls:'chip-custo'},
    ]
  },
];

let slides = [];
for (const loja of LOJAS)
  for (const view of VIEWS)
    slides.push({ loja, view });

let slideIdx   = 0;
let dados      = null;
let colBodies  = [];

// ── Carrossel ──────────────────────────────────────
const PX_POR_SEG = 25;
let _carTimer = null, _carTimeout = null, _carSessao = 0, _ultimoAvanço = 0;

function pararCarrossel() {
  if (_carTimer)   { clearInterval(_carTimer);  _carTimer   = null; }
  if (_carTimeout) { clearTimeout(_carTimeout); _carTimeout = null; }
}

function proximaColuna(colIdx, slideLocal, sessao) {
  pararCarrossel();
  const nextCol = colIdx + 1;
  if (nextCol < colBodies.length) {
    _carTimeout = setTimeout(() => iniciarCarrosselCol(nextCol, slideLocal, sessao), 900);
  } else {
    const nextSlide = (slideLocal + 1) % slides.length;
    slideIdx = nextSlide;
    if (nextSlide === 0) {
      const sp = new URLSearchParams(location.search);
      const isAutoMode = sp.get('auto') === '1';
      const idxMode   = parseInt(sp.get('idx') || '0');
      const ORDEM_CICLO = ['FATIMA','FERNANDA','PRISCILA','MARCOS','RENATA'];
      if (isAutoMode) {
        const prox = idxMode + 1;
        if (prox < ORDEM_CICLO.length) {
          _carTimeout = setTimeout(() => {
            location.href = '/comprador.html?nome=' + ORDEM_CICLO[prox] + '&auto=1&idx=' + prox;
          }, 1200);
        } else {
          try { window.parent.postMessage({ type: 'analiseCycleComplete' }, '*'); } catch(_) {}
          _carTimeout = setTimeout(() => renderSlide(slides[0]), 1200);
        }
        return;
      }
      try { window.parent.postMessage({ type: 'analiseCycleComplete' }, '*'); } catch(_) {}
    }
    _carTimeout = setTimeout(() => renderSlide(slides[nextSlide]), 1200);
  }
}

function iniciarCarrosselCol(colIdx, slideLocal, sessao) {
  if (sessao === undefined) { _carSessao++; sessao = _carSessao; }
  pararCarrossel();
  if (!colBodies.length) return;
  _ultimoAvanço = Date.now();

  document.querySelectorAll('.col').forEach((c, i) => c.classList.toggle('ativo', i === colIdx));
  const cfg = slides[slideLocal].view.cols[colIdx];
  document.getElementById('col-label').textContent = cfg.icon + ' ' + cfg.title;

  const body = colBodies[colIdx];
  if (!body) { _carTimeout = setTimeout(() => proximaColuna(colIdx, slideLocal, sessao), 2000); return; }

  body.scrollTop = 0;
  void body.scrollHeight;
  const maxScroll = body.scrollHeight - body.clientHeight;

  if (maxScroll <= 0) {
    _carTimeout = setTimeout(() => proximaColuna(colIdx, slideLocal, sessao), 3000);
    return;
  }

  const tickMs = 50;
  const pxTick = PX_POR_SEG * tickMs / 1000;
  _carTimer = setInterval(() => {
    if (sessao !== _carSessao) { clearInterval(_carTimer); _carTimer = null; return; }
    body.scrollTop += pxTick;
    if (body.scrollTop >= maxScroll - 1) {
      pararCarrossel();
      _carTimeout = setTimeout(() => proximaColuna(colIdx, slideLocal, sessao), 2000);
    }
  }, tickMs);
}

// watchdog: se parado > 2 min sem hide, retoma
setInterval(() => {
  if (colBodies.length && !_carTimer && !_carTimeout && Date.now() - _ultimoAvanço > 120000)
    iniciarCarrosselCol(0, slideIdx, undefined);
}, 15000);

// ── Clock ──
function tick() {
  const n = new Date(), p = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
}
setInterval(tick,1000); tick();

// ── Setup header ──
function setupHeader() {
  document.getElementById('h-nome').textContent = NOME;
  document.getElementById('h-cargo').textContent = CARGO_COMPRADORES[NOME]||'Compradora';
  const av  = document.getElementById('h-avatar');
  const cor = COR_COMPRADORES[NOME]||'#6366f1';
  av.style.cssText = `background:${cor}22;border:2px solid ${cor};color:${cor}`;
  av.textContent = NOME[0];
}

// ── Render itens ──
function renderItem(key, r, maxQtd) {
  if (key === 'ruptura') {
    const chip = r.diasCobertura < 10 ? 'chip-crit' : r.diasCobertura < 20 ? 'chip-alto' : 'chip-med';
    return `<div class="item-row">
      <div class="item-info">
        <div class="item-cod">${r.codigo}</div>
        <div class="item-nome">${r.descricao}</div>
        <div class="item-meta">Estq: ${r.estoque} · Média: ${r.mediaDiaria}/dia</div>
      </div>
      <div class="item-chip ${chip}">${r.diasCobertura}d</div>
    </div>`;
  }
  if (key === 'excesso') {
    return `<div class="item-row">
      <div class="item-info">
        <div class="item-cod">${r.codigo}</div>
        <div class="item-nome">${r.descricao}</div>
        <div class="item-meta">Estq: ${r.estoque} · Média: ${r.mediaDiaria}/dia</div>
      </div>
      <div class="item-chip chip-exc">${r.diasCobertura}d</div>
    </div>`;
  }
  if (key === 'semVenda') {
    const label = r.diasSemVenda >= 999 ? '60+d' : r.diasSemVenda+'d';
    return `<div class="item-row">
      <div class="item-info">
        <div class="item-cod">${r.codigo}</div>
        <div class="item-nome">${r.descricao}</div>
        <div class="item-meta">Estq: ${r.estoque} · Últ: ${r.ultimaVenda||'—'}</div>
      </div>
      <div class="item-chip chip-sem">${label}</div>
    </div>`;
  }
  if (key === 'topVendidos') {
    const pct = maxQtd > 0 ? Math.round(r.qtd30/maxQtd*100) : 0;
    return `<div class="item-row">
      <div class="item-info">
        <div class="item-cod">${r.codigo}</div>
        <div class="item-nome">${r.descricao}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="item-chip chip-top">${Number(r.qtd30).toLocaleString('pt-BR')} un</div>
    </div>`;
  }
  if (key === 'quedaGiro') {
    return `<div class="item-row">
      <div class="item-info">
        <div class="item-cod">${r.codigo}</div>
        <div class="item-nome">${r.descricao}</div>
        <div class="item-meta">${r.qtd30ant} → ${r.qtd30} un</div>
      </div>
      <div class="item-chip chip-queda">▼${r.quedaPct}%</div>
    </div>`;
  }
  if (key === 'custo') {
    return `<div class="item-row">
      <div class="item-info">
        <div class="item-cod">${r.codigo}</div>
        <div class="item-nome">${r.descricao}</div>
        <div class="item-meta">Ant: R$${r.custoAnt.toFixed(2)} → R$${r.custoAtual.toFixed(2)}</div>
      </div>
      <div class="item-chip chip-custo">▲${r.varPct}%</div>
    </div>`;
  }
  return '';
}

function buildColHTML(cfg, lista) {
  const maxQtd = lista[0]?.qtd30 || 1;
  const body = lista.length
    ? lista.map(r => renderItem(cfg.key, r, maxQtd)).join('')
    : `<div class="col-empty">
         <div class="col-empty-icon">✅</div>
         <div class="col-empty-txt">Nenhuma ocorrência</div>
       </div>`;
  return `
    <div class="col">
      <div class="col-head">
        <span class="col-icon">${cfg.icon}</span>
        <span class="col-title">${cfg.title}</span>
        <span class="item-chip ${cfg.countCls}">${lista.length}</span>
      </div>
      <div class="col-body">${body}</div>
    </div>`;
}

function renderSlide(slide) {
  pararCarrossel();
  const { loja, view } = slide;
  const ld = dados?.lojas?.[loja] || {};

  document.getElementById('loja-label').textContent = `LOJA ${loja}`;
  document.getElementById('view-label').textContent  = view.label;

  document.querySelectorAll('.ldot').forEach(d => {
    const l = d.dataset.l;
    d.classList.remove('ativo','done');
    if (l === loja) d.classList.add('ativo');
    else if (parseInt(l) < parseInt(loja)) d.classList.add('done');
  });

  let html = '';
  for (const cfg of view.cols) {
    const lista = cfg.key === 'custo' ? (dados?.variacaoCusto||[]) : (ld[cfg.key]||[]);
    html += buildColHTML(cfg, lista);
  }
  document.getElementById('main-cols').innerHTML = html;

  colBodies = Array.from(document.querySelectorAll('.col-body'));
  const localSlide = slideIdx;
  setTimeout(() => iniciarCarrosselCol(0, localSlide, undefined), 300);
}

// ── Mock data (quando comprador sem dados reais) ──
function gerarMockDados(nome) {
  const PRODS = {
    FATIMA:   ['Arroz Tipo 1 5kg','Feijão Carioca 1kg','Macarrão Espaguete 500g','Farinha de Trigo 1kg','Açúcar Cristal 1kg','Óleo de Soja 900ml','Café Torrado 500g','Biscoito Cream Cracker','Molho de Tomate 340g','Leite Integral 1L','Manteiga com Sal 200g','Sardinha Lata 125g','Atum Conserva 170g','Amido de Milho 200g','Extrato Tomate 130g','Maionese 250g'],
    FERNANDA: ['Shampoo Anticaspa 400ml','Sabonete Barra 90g','Creme Dental 90g','Desodorante Aerossol','Absorvente Noturno 8un','Fralda Descartável M c32','Papel Higiênico 4un','Sabão em Pó 1kg','Amaciante 2L','Detergente 500ml','Água Sanitária 1L','Limpador Multiuso 500ml'],
    PRISCILA: ['Refrigerante Cola 2L','Suco Laranja 1L','Água Mineral 500ml','Cerveja Lata 350ml','Iogurte Natural 200g','Queijo Mussarela 200g','Presunto Fatiado 200g','Requeijão Cremoso 200g','Margarina 500g','Creme de Leite 200ml','Suco Uva Integral 1L','Leite Fermentado 80g'],
    MARCOS:   ['Tomate kg','Cebola kg','Alface Crespa un','Banana Prata kg','Maçã Gala kg','Pão Francês 50g','Pão de Forma 500g','Bolo de Laranja 400g','Cenoura kg','Batata kg','Couve Manteiga un','Pepino un'],
    RENATA:   ['Vassoura Nylon 300g','Rodo 60cm','Balde 10L','Esponja Dupla Face','Saco de Lixo 30L c20','Pilha AA Alcalina c4','Vela 3 Horas c8','Copo Descartável 200ml c50','Escova Dente Macia','Fita Adesiva 45mm'],
  };
  const key = Object.keys(PRODS).find(k => nome.startsWith(k)) || 'FATIMA';
  const prods = PRODS[key];
  const rnd = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
  const cod  = i  => String(7890001000000 + i*137).slice(0,13);
  const p    = i  => ({ codigo: cod(i), descricao: prods[i % prods.length] });

  const lojas = {};
  for (const ln of ['1','2','3','4','5','6']) {
    const s = parseInt(ln)*3;
    lojas[ln] = {
      ruptura:    Array.from({length:rnd(3,6)},(_,i)=>({...p(i+s),   estoque:rnd(2,40),    mediaDiaria:+(rnd(2,12)/10).toFixed(2), diasCobertura:rnd(3,35)}))  .sort((a,b)=>a.diasCobertura-b.diasCobertura),
      excesso:    Array.from({length:rnd(2,4)},(_,i)=>({...p(i+s+6), estoque:rnd(200,800), mediaDiaria:+(rnd(3,15)/10).toFixed(2), diasCobertura:rnd(90,200)})).sort((a,b)=>b.diasCobertura-a.diasCobertura),
      semVenda:   Array.from({length:rnd(2,4)},(_,i)=>({...p(i+s+10),estoque:rnd(5,60),    diasSemVenda:rnd(60,180), ultimaVenda:`2026-0${rnd(1,4)}-${String(rnd(1,28)).padStart(2,'0')}`})).sort((a,b)=>b.diasSemVenda-a.diasSemVenda),
      topVendidos:Array.from({length:rnd(5,8)},(_,i)=>({...p(i+s+1), qtd30:rnd(60,350),    mediaDiaria:+(rnd(20,120)/10).toFixed(2)})).sort((a,b)=>b.qtd30-a.qtd30),
      quedaGiro:  Array.from({length:rnd(2,4)},(_,i)=>({...p(i+s+4), qtd30:rnd(8,30),      qtd30ant:rnd(45,90), quedaPct:rnd(32,65)})).sort((a,b)=>b.quedaPct-a.quedaPct),
    };
  }
  const variacaoCusto = Array.from({length:rnd(3,5)},(_,i)=>{
    const ant=+(rnd(200,1200)/100).toFixed(2);
    const atu=+(ant*(1+rnd(6,28)/100)).toFixed(2);
    return {...p(i+2), custoAnt:ant, custoAtual:atu, varPct:+(((atu-ant)/ant)*100).toFixed(1)};
  }).sort((a,b)=>b.varPct-a.varPct);

  return { lojas, variacaoCusto, totalProdutos: prods.length, geradoEm: new Date().toISOString(), _demo:true };
}

// ── Fetch ──
async function buscarDados() {
  try {
    const r = await fetch(`/api/compras/analise-estoque?comprador=${NOME}`);
    if (!r.ok) throw new Error('HTTP '+r.status);
    dados = await r.json();
    if (!dados.totalProdutos) dados = gerarMockDados(NOME);
    const ge = dados.geradoEm ? new Date(dados.geradoEm) : new Date();
    const p = x => String(x).padStart(2,'0');
    const demo = dados._demo ? ' · DEMO' : '';
    document.getElementById('h-update').textContent =
      `${dados.totalProdutos} produtos · ${p(ge.getHours())}:${p(ge.getMinutes())}${demo}`;
    if (!_ultimoAvanço) renderSlide(slides[slideIdx]);
  } catch(e) {
    dados = gerarMockDados(NOME);
    document.getElementById('h-update').textContent = `DEMO · ${dados.totalProdutos} produtos`;
    if (!_ultimoAvanço) renderSlide(slides[slideIdx]);
  }
}

document.getElementById('main-cols').innerHTML =
  `<div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3)">
    ⏳ Calculando análise das listas de ${NOME}...
   </div>`;
