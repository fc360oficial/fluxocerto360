<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cronograma Mensal de Compras — Econômico</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#fff;color:#1a1a1a;font-size:11px}

/* TELA */
@media screen {
  body{background:#e5e7eb;padding:20px}
  .pagina{background:#fff;width:210mm;margin:0 auto 24px;padding:16mm 14mm;
    box-shadow:0 4px 24px rgba(0,0,0,.15);border-radius:4px}
  .btn-imprimir{
    display:block;width:210mm;margin:0 auto 16px;padding:10px;
    background:#FACC15;border:none;font-weight:800;font-size:14px;
    cursor:pointer;border-radius:6px;letter-spacing:.05em;color:#1a1a1a;
  }
  .btn-imprimir:hover{background:#eab308}
}

/* IMPRESSÃO */
@media print {
  body{background:#fff;padding:0}
  .btn-imprimir{display:none}
  .pagina{width:100%;padding:10mm 12mm;page-break-after:always;break-after:page}
  .pagina:last-child{page-break-after:auto}
}

/* CABEÇALHO DA PÁGINA */
.pg-header{display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid #FACC15;padding-bottom:8px;margin-bottom:14px}
.pg-logo-area{display:flex;align-items:center;gap:10px}
.pg-logo{font-size:18px;font-weight:900;letter-spacing:.1em;color:#1a1a1a}
.pg-logo span{color:#FACC15}
.pg-sub{font-size:8px;color:#6b7280;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.pg-meta{text-align:right;font-size:9px;color:#6b7280}
.pg-meta strong{display:block;font-size:11px;color:#1a1a1a}

/* COMPRADOR */
.comprador-header{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:6px;margin-bottom:12px;
  color:#fff;
}
.comprador-nome{font-size:16px;font-weight:900;letter-spacing:.05em}
.comprador-cargo{font-size:9px;opacity:.85;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

/* GRUPOS DE SEMANA */
.grupos{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* GRUPO */
.grupo{border:1px solid #e5e7eb;border-radius:6px;overflow:hidden}
.grupo-header{
  padding:5px 10px;font-size:9px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:#fff;
}

/* TABELA */
table{width:100%;border-collapse:collapse}
thead th{
  background:#f9fafb;font-size:8px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;color:#6b7280;
  padding:4px 6px;border-bottom:1px solid #e5e7eb;
  text-align:left;
}
thead th.tc{text-align:center;width:20px}
tbody tr{border-bottom:1px solid #f3f4f6}
tbody tr:last-child{border-bottom:none}
tbody tr.dia-header{background:#f9fafb}
td{padding:3px 6px;vertical-align:middle}
td.dia{font-weight:800;font-size:9px;text-transform:uppercase;
  letter-spacing:.08em;white-space:nowrap;color:#374151;width:28px}
td.fornec{font-size:9.5px;color:#111827;line-height:1.3}
td.cat{font-size:8px;color:#9ca3af;white-space:nowrap}
td.check{text-align:center;width:20px}
.check-box{width:12px;height:12px;border:1.5px solid #d1d5db;border-radius:2px;display:inline-block}

/* rodapé */
.pg-footer{margin-top:14px;border-top:1px solid #e5e7eb;padding-top:6px;
  display:flex;justify-content:space-between;font-size:8px;color:#9ca3af}
.obs-line{
  margin-top:8px;border-bottom:1px solid #e5e7eb;
  height:18px;font-size:8px;color:#9ca3af;
  display:flex;align-items:flex-end;padding-bottom:2px;
}
</style>
</head>

          {nome:'VITIVINICOLA QUINTA DE SAO BRAZ',cat:'Vinhos'},
          {nome:'CERVEJARIA PETROPOLIS',cat:'Bebidas'},
        ],
        TER:[
          {nome:'IANE INDUSTRIA DE ALIMENTOS NORDESTE',cat:'Alimentos'},
          {nome:'JOSE CLAUDIO & BARROS LTDA',cat:'Alimentos'},
          {nome:'RA COMERCIO DE BEBIDAS LTDA',cat:'Bebidas'},
          {nome:'RAMOS INDUSTRIA DE ALIMENTOS LTDA',cat:'Alimentos'},
        ],
        QUA:[
          {nome:'GRAND MARCA DISTRIBUIDORA LTDA',cat:'Distribuição'},
          {nome:'ALIMENTOS TIA SONIA LTDA',cat:'Alimentos'},
          {nome:'AUJO DISTRIBUIDORA DE ALIMENTO',cat:'Distribuição'},
          {nome:'DIA DIST E IMPORTACAO AFOGADOS',cat:'Distribuição'},
          {nome:'GRAND MARCA DISTRIBUIDORA LTDA',cat:'Distribuição'},
          {nome:'GRIFOS COMERCIO DE ALIMENTOS',cat:'Distribuição'},
          {nome:'NATGEO COMERCIO E REPRESENTACAO',cat:'Distribuição'},
          {nome:'RICARDO BERNARDO DA SILVA',cat:'Distribuição'},
          {nome:'TALENTOS IND COM ALIMENTOS',cat:'Alimentos'},

        QUI:[
          {nome:'J.R.ATACADO LIMITADA',cat:'Atacado'},
          {nome:'RECIFE DOCES E CARAMELOS LTDA',cat:'Doces'},
        ],
        SEX:[
          {nome:'ATACAREJO ECONOMICO (VINHOS)',cat:'Vinhos'},
        ],
      },
    }

];

const DIAS = ['SEG','TER','QUA','QUI','SEX'];
const DIAS_L = {SEG:'Segunda',TER:'Terça',QUA:'Quarta',QUI:'Quinta',SEX:'Sexta'};
const GRUPOS_L = {'1e3':'SEMANAS 1 e 3','2e4':'SEMANAS 2 e 4'};

const hoje = new Date();
const dataStr = hoje.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});

function buildTabela(grupo) {
  const linhas = [];
  for (const dia of DIAS) {
    const fornecs = grupo[dia] || [];
    if (!fornecs.length) continue;
    fornecs.forEach((f, i) => {
      linhas.push(`<tr>
        <td class="dia">${i===0 ? DIAS_L[dia] : ''}</td>
        <td class="fornec">${f.nome}</td>
        <td class="cat">${f.cat}</td>
        <td class="check"><span class="check-box"></span></td>
      </tr>`);
    });
  }
  return linhas.join('');
}

let html = '';
for (const c of COMPRADORES) {
  html += `
  <div class="pagina">
    <div class="pg-header">
      <div class="pg-logo-area">
        <div>
          <div class="pg-logo">ECO<span>N</span>ÔMICO</div>
          <div class="pg-sub">Cronograma de Compras</div>
        </div>
      </div>
      <div class="pg-meta">
        <strong>${c.nome} — ${c.cargo}</strong>
        Emitido em ${dataStr}
      </div>
    </div>

    <div class="comprador-header" style="background:${c.cor}">
      <div>
        <div class="comprador-nome">${c.nome}</div>
        <div class="comprador-cargo">${c.cargo}</div>
      </div>
    </div>

    <div class="grupos">`;

  for (const [gKey, gLabel] of Object.entries(GRUPOS_L)) {
    const grupo = c.cron[gKey];
    html += `
      <div class="grupo">
        <div class="grupo-header" style="background:${c.cor}">${gLabel}</div>
        <table>
          <thead><tr>
            <th style="width:60px">Dia</th>
            <th>Fornecedor</th>
            <th style="width:70px">Categoria</th>
            <th class="tc">✓</th>
          </tr></thead>
          <tbody>${buildTabela(grupo)}</tbody>
        </table>
      </div>`;
  }

  html += `
    </div>

    <div style="margin-top:10px">
      <div class="obs-line">Observações: _______________________________________________________________________________________________________________</div>
      <div class="obs-line">___________________________________________________________________________________________________________________________________________</div>
    </div>

    <div class="pg-footer">
      <span>Econômico Supermercados — Uso interno</span>
      <span>Assinatura: ____________________________</span>
    </div>
  </div>`;
}

document.body.insertAdjacentHTML('beforeend', html);
</script>
</body>
</html>
