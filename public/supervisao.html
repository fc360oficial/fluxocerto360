<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Todos Setores — Econômico Relatórios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
iframe{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border:none;opacity:0;pointer-events:none;transition:opacity .6s;
}
iframe.visivel{opacity:1;pointer-events:auto}
.controles{
  position:fixed;bottom:12px;right:16px;z-index:999;
  display:flex;gap:8px;align-items:center;
  background:rgba(0,0,0,.55);border-radius:24px;
  padding:7px 12px;backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);
}
.dot{
  width:11px;height:11px;border-radius:50%;
  background:rgba(255,255,255,.22);transition:background .3s,transform .2s;
  cursor:pointer;flex-shrink:0;
}
.dot:hover{background:rgba(255,255,255,.55);transform:scale(1.3)}
.dot.ativo{background:rgba(250,204,21,.9)}
.dot.off{background:rgba(255,255,255,.10);opacity:.5}
.sep{width:1px;height:14px;background:rgba(255,255,255,.15);flex-shrink:0}
.btn-fs{
  background:none;border:none;cursor:pointer;padding:0 2px;
  color:rgba(255,255,255,.5);font-size:15px;line-height:1;
  transition:color .2s,transform .2s;display:flex;align-items:center;
}
.btn-fs:hover{color:rgba(250,204,21,.9);transform:scale(1.2)}
.controles{opacity:0;transition:opacity .4s}
.controles:hover{opacity:1}
</style>
</head>
<body>

<iframe id="fr-diretoria" title="Diretoria"       allow="fullscreen" allowfullscreen></iframe>
<iframe id="fr-precif"   title="Precificação"    allow="fullscreen" allowfullscreen></iframe>
<iframe id="fr-compras"  title="Compras Geral"   allow="fullscreen" allowfullscreen></iframe>
<iframe id="fr-ruptura"  title="Rupturas Compras" allow="fullscreen" allowfullscreen></iframe>
<iframe id="fr-margem"   title="Margem Compradores" allow="fullscreen" allowfullscreen></iframe>
<iframe id="fr-mensal"   title="Mensal Compradores" allow="fullscreen" allowfullscreen></iframe>
<iframe id="fr-comptvs"  title="Comparativo TV"  allow="fullscreen" allowfullscreen></iframe>

<div class="controles">
  <!-- rotação ativa: Diretoria → Comparativo TV → Precificação → Compras → Rupturas → Margem → Mensal -->
  <div class="dot ativo" id="dot-d"  title="Diretoria"></div>
  <div class="dot"       id="dot-ct" title="Comparativo TV"></div>
  <div class="dot"       id="dot-p"  title="Precificação"></div>
  <div class="dot"       id="dot-c"  title="Compras"></div>
  <div class="dot"       id="dot-r"  title="Rupturas"></div>
  <div class="dot"       id="dot-mg" title="Margem"></div>
  <div class="dot"       id="dot-m"  title="Mensal"></div>
  <div class="sep"></div>
  <button class="btn-fs" id="btn-fs" title="Tela cheia (F11)">⛶</button>
</div>

<script>
const BASE = 'http://192.168.2.252:3003';
const TV = window.innerWidth >= 1900 ? '?tv=1' : '';

let atual = 'diretoria';

const frD  = document.getElementById('fr-diretoria');
const frP  = document.getElementById('fr-precif');
const frC  = document.getElementById('fr-compras');
const frR  = document.getElementById('fr-ruptura');
const frMG = document.getElementById('fr-margem');
const frM  = document.getElementById('fr-mensal');
const frCT = document.getElementById('fr-comptvs');

const dotD  = document.getElementById('dot-d');
const dotP  = document.getElementById('dot-p');
const dotC  = document.getElementById('dot-c');
const dotR  = document.getElementById('dot-r');
const dotMG = document.getElementById('dot-mg');
const dotM  = document.getElementById('dot-m');
const dotCT = document.getElementById('dot-ct');
const btnFs = document.getElementById('btn-fs');

const todosFrames = [frD,frCT,frP,frC,frR,frMG,frM];
const todosDots   = [dotD,dotCT,dotP,dotC,dotR,dotMG,dotM];

function mostrar(iframe, dot, nome) {
  atual = nome;
  todosFrames.forEach(f => {
    f.classList.remove('visivel');
    if (f !== iframe) f.src = 'about:blank'; // para scripts em background
  });
  todosDots.forEach(d => d.classList.remove('ativo'));
  iframe.classList.add('visivel');
  dot.classList.add('ativo');
  setTimeout(reforcarTelaCheia, 200);
}

// força reload mesmo que a src seja igual
function carregarIframe(iframe, url) {
  iframe.src = 'about:blank';
  setTimeout(() => { iframe.src = url; }, 30);
}

// Alguns navegadores (Fire TV/Silk) saem da tela cheia sozinhos quando o
// iframe navega, mesmo com allowfullscreen. Se estava em tela cheia antes
// da troca de painel, tenta voltar automaticamente depois.
let queriaTelaCheia = false;
document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) queriaTelaCheia = true;
});
function reforcarTelaCheia() {
  if (queriaTelaCheia && !document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
}

// ── Rotação automática ──
function mostrarDiretoria() {
  carregarIframe(frD, BASE + '/diretoria.html' + TV);
  mostrar(frD, dotD, 'diretoria');
}
function mostrarComparativoTV() {
  carregarIframe(frCT, BASE + '/comparativo-tv.html' + TV);
  mostrar(frCT, dotCT, 'comptvs');
}
function mostrarPrecif() {
  carregarIframe(frP, BASE + '/precificacao.html' + (TV ? TV : ''));
  mostrar(frP, dotP, 'precif');
}
function mostrarCompras() {
  carregarIframe(frC, BASE + '/compras.html' + TV);
  mostrar(frC, dotC, 'compras');
}
function mostrarRuptura() {
  carregarIframe(frR, BASE + '/ruptura-painel.html' + TV);
  mostrar(frR, dotR, 'ruptura');
}
function mostrarMargem() {
  carregarIframe(frMG, BASE + '/margem-comprador.html?auto=1&idx=0' + (TV ? '&tv=1' : ''));
  mostrar(frMG, dotMG, 'margem');
}
function mostrarMensal() {
  carregarIframe(frM, BASE + '/mensal.html?nome=FATIMA&auto=1&idx=0' + (TV ? '&tv=1' : ''));
  mostrar(frM, dotM, 'mensal');
}

// ── Rotação: Diretoria → Comparativo TV → Precificação → Compras → Rupturas → Margem → Mensal → Diretoria ──
window.addEventListener('message', (e) => {
  if (!e.data || !e.data.type) return;
  if (e.data.type === 'diretoriaCycleComplete'      && atual === 'diretoria') mostrarComparativoTV();
  if (e.data.type === 'comparativoTvCycleComplete'  && atual === 'comptvs')   mostrarPrecif();
  if (e.data.type === 'carouselCycleComplete'       && atual === 'precif')    mostrarCompras();
  if (e.data.type === 'comprasCycleComplete'        && atual === 'compras')   mostrarRuptura();
  if (e.data.type === 'rupturaCycleComplete'        && atual === 'ruptura')   mostrarMargem();
  if (e.data.type === 'margemCycleComplete'         && atual === 'margem')    mostrarMensal();
  if (e.data.type === 'mensalCycleComplete'         && atual === 'mensal')    mostrarDiretoria();
  // fullscreen controlado pelo pai para persistir entre slides
  if (e.data.type === 'requestFullscreen') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen().catch(()=>{});
  }
});

// ── Tela cheia ──
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen().catch(()=>{});
}
document.addEventListener('fullscreenchange', () => {
  const fs = !!document.fullscreenElement;
  btnFs.textContent = fs ? '✕' : '⛶';
  btnFs.title = fs ? 'Sair da tela cheia (Esc)' : 'Tela cheia (F11)';
});
btnFs.addEventListener('click', toggleFullscreen);

// ── Dots ──
dotD.addEventListener('click',  mostrarDiretoria);
dotP.addEventListener('click',  mostrarPrecif);
dotC.addEventListener('click',  mostrarCompras);
dotR.addEventListener('click',  mostrarRuptura);
dotMG.addEventListener('click', mostrarMargem);
dotM.addEventListener('click',  mostrarMensal);
dotCT.addEventListener('click', mostrarComparativoTV);

// ── Início: Diretoria ──
mostrarDiretoria();
</script>
</body>
</html>
