<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Supervisão — Econômico Relatórios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;transition:opacity .5s}
iframe.oculto{opacity:0;pointer-events:none}

/* Indicador discreto no canto */
.indicador{
  position:fixed;bottom:8px;right:12px;z-index:999;
  display:flex;gap:5px;align-items:center;
}
.dot{
  width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);
  transition:background .3s;
}
.dot.ativo{background:rgba(250,204,21,.8)}
</style>
</head>
<body>

<iframe id="fr-compras"  src="/compras.html"       title="Compras"></iframe>
<iframe id="fr-precif"   src="/precificacao.html"  title="Precificação" class="oculto"></iframe>

<div class="indicador">
  <div class="dot ativo" id="dot-compras"  title="Compras"></div>
  <div class="dot"       id="dot-precif"   title="Precificação"></div>
</div>

<script>
// Duração do compras antes de mudar (ms) — ajuste conforme necessário
const TEMPO_COMPRAS_MS = 2 * 60 * 1000; // 2 minutos

let atual = 'compras';
let timerCompras = null;

function mostrar(qual) {
  const compras = document.getElementById('fr-compras');
  const precif  = document.getElementById('fr-precif');
  const dotC    = document.getElementById('dot-compras');
  const dotP    = document.getElementById('dot-precif');

  clearTimeout(timerCompras);
  atual = qual;

  if (qual === 'compras') {
    compras.classList.remove('oculto');
    precif.classList.add('oculto');
    dotC.classList.add('ativo');
    dotP.classList.remove('ativo');
    // Após TEMPO_COMPRAS_MS muda para precificação
    timerCompras = setTimeout(() => mostrar('precif'), TEMPO_COMPRAS_MS);
  } else {
    precif.classList.remove('oculto');
    compras.classList.add('oculto');
    dotP.classList.add('ativo');
    dotC.classList.remove('ativo');
    // Precificação manda postMessage quando ciclo completo → volta pro compras
  }
}

// Quando o carrossel da precificação termina um ciclo completo (6→1)
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'carouselCycleComplete' && atual === 'precif') {
    mostrar('compras');
  }
});

// Inicia com compras
mostrar('compras');
</script>
</body>
</html>
