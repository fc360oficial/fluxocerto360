<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Supervisão — Econômico Relatórios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
iframe{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border:none;opacity:0;pointer-events:none;transition:opacity .6s;
}
iframe.visivel{opacity:1;pointer-events:auto}

/* Indicador discreto no canto */
.dots{
  position:fixed;bottom:10px;right:14px;z-index:999;
  display:flex;gap:6px;align-items:center;
}
.dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.18);transition:background .4s;
}
.dot.ativo{background:rgba(250,204,21,.85)}
</style>
</head>
<body>

<iframe id="fr-diretoria" title="Diretoria"></iframe>
<iframe id="fr-precif"   title="Precificação"></iframe>
<iframe id="fr-compras"  title="Compras"></iframe>

<div class="dots">
  <div class="dot ativo" id="dot-d" title="Diretoria"></div>
  <div class="dot"       id="dot-p" title="Precificação"></div>
  <div class="dot"       id="dot-c" title="Compras"></div>
</div>

<script>
// Sempre carrega os iframes do servidor de produção,
// independente de qual IP foi usado pra abrir esta página.
const BASE = 'http://192.168.2.252:3003';

let atual = 'diretoria';

const frD  = document.getElementById('fr-diretoria');
const frP  = document.getElementById('fr-precif');
const frC  = document.getElementById('fr-compras');
const dotD = document.getElementById('dot-d');
const dotP = document.getElementById('dot-p');
const dotC = document.getElementById('dot-c');

function mostrarDiretoria() {
  atual = 'diretoria';
  frD.src = BASE + '/diretoria.html';
  frD.classList.add('visivel');
  frP.classList.remove('visivel');
  frC.classList.remove('visivel');
  dotD.classList.add('ativo');
  dotP.classList.remove('ativo');
  dotC.classList.remove('ativo');
}

function mostrarPrecif() {
  atual = 'precif';
  frP.classList.add('visivel');
  frD.classList.remove('visivel');
  frC.classList.remove('visivel');
  dotP.classList.add('ativo');
  dotD.classList.remove('ativo');
  dotC.classList.remove('ativo');
}

function mostrarCompras() {
  atual = 'compras';
  frC.src = BASE + '/compras.html';
  frC.classList.add('visivel');
  frD.classList.remove('visivel');
  frP.classList.remove('visivel');
  dotC.classList.add('ativo');
  dotD.classList.remove('ativo');
  dotP.classList.remove('ativo');
}

window.addEventListener('message', (e) => {
  if (!e.data || !e.data.type) return;

  // Diretoria terminou → vai para precificação
  if (e.data.type === 'diretoriaCycleComplete' && atual === 'diretoria') {
    mostrarPrecif();
  }

  // Precificação terminou carrossel (col 6 → volta col 1) → vai para compras
  if (e.data.type === 'carouselCycleComplete' && atual === 'precif') {
    mostrarCompras();
  }

  // Compras terminou todos os compradores → volta para diretoria
  if (e.data.type === 'comprasCycleComplete' && atual === 'compras') {
    mostrarDiretoria();
  }
});

// Pré-carrega precificação do servidor correto e inicia mostrando diretoria
frP.src = BASE + '/precificacao.html';
mostrarDiretoria();
</script>
</body>
</html>
