<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Econômico Relatórios — Início</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Superfícies ── */
  --bg:#F7F7F5;
  --surface:#FFFFFF;
  --surface-2:#F1F2F0;
  --border:#E6E7E3;
  --border-strong:#D9DAD5;

  /* ── Texto ── */
  --ink:#16233F;
  --ink-2:#5B6373;
  --ink-3:#9AA0AC;

  /* ── Marca ── */
  --brand:#FFC600;
  --brand-ink:#5C4600;

  /* ── Semântico ── */
  --green:#158A4A;
  --green-bg:#EAF7EF;
  --red:#D6314A;
  --red-bg:#FCEBEE;

  --shadow-sm:0 1px 2px rgba(22,35,63,.04);
  --shadow-md:0 8px 24px -8px rgba(22,35,63,.12);
  --font:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
}
html,body{min-height:100%;font-family:var(--font);background:var(--bg);color:var(--ink)}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:clamp(24px,6vw,48px) 16px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 46% at 85% -8%,rgba(255,198,0,.16) 0%,transparent 62%),
             radial-gradient(ellipse 45% 35% at 0% 100%,rgba(22,35,63,.04) 0%,transparent 60%);
}
/* faixa de marca no topo da viewport */
body::after{
  content:'';position:fixed;top:0;left:0;right:0;height:5px;z-index:2;
  background:linear-gradient(90deg,#FFD84D,var(--brand) 45%,#FFB800);
}

/* ── TOPO ── */
.topo{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:28px;z-index:1;position:relative}
.topo-logo-wrap{
  width:96px;height:96px;border-radius:26px;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%,#FFF3C4,#FFDE7A 60%,#FFC600);
  box-shadow:0 10px 28px -10px rgba(255,198,0,.55),inset 0 1px 0 rgba(255,255,255,.5);
}
.topo-logo{height:60px;filter:drop-shadow(0 2px 4px rgba(22,35,63,.15))}
.topo-nome{font-size:12px;font-weight:700;letter-spacing:3px;color:var(--ink-2);text-transform:uppercase}
.topo-nome::after{
  content:'';display:block;width:28px;height:3px;margin:8px auto 0;
  border-radius:2px;background:var(--brand);
}

/* ── CARD PRINCIPAL ── */
.painel{
  width:100%;max-width:420px;z-index:1;position:relative;
  background:var(--surface);
  border:1px solid var(--border);
  border-left:5px solid var(--brand);
  border-radius:20px;
  box-shadow:var(--shadow-md);
  padding:14px;
}
.nav{display:flex;flex-direction:column;gap:3px}

/* ── SEÇÃO ── */
.nav-section{font-size:10px;font-weight:700;letter-spacing:1.6px;color:var(--ink-3);text-transform:uppercase;padding:16px 10px 8px;margin-top:2px}
.nav-section:first-child{padding-top:6px}

/* ── ITEM ── */
.nav-item{
  display:flex;align-items:center;gap:14px;
  padding:14px;border-radius:14px;
  text-decoration:none;color:var(--ink-2);
  background:var(--surface);border:1px solid transparent;
  border-left:3px solid transparent;
  transition:background .18s ease,border-color .18s ease,transform .12s ease;
  cursor:pointer;user-select:none;position:relative;
}
.nav-item:hover,.nav-item.ativo{
  background:var(--surface-2);border-left-color:var(--brand);
}
.nav-item:active{transform:scale(.997)}
.nav-icon{
  width:40px;height:40px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:linear-gradient(160deg,#FFFAE8,#FFF1C2);border:1px solid #FCE8A0;
  transition:background .18s ease,border-color .18s ease,transform .18s ease;
}
.nav-item:hover .nav-icon,.nav-item.ativo .nav-icon{background:linear-gradient(160deg,#FFE8A3,var(--brand));border-color:#E8AF00;transform:scale(1.05)}
.nav-body{flex:1;min-width:0}
.nav-title{font-size:14px;font-weight:700;color:var(--ink);line-height:1.25}
.nav-desc{font-size:12px;color:var(--ink-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-arrow{font-size:11px;color:var(--ink-3);flex-shrink:0;transition:transform .25s ease,color .18s ease}
.nav-item:hover .nav-arrow,.nav-item.ativo .nav-arrow{color:var(--brand-ink)}
.nav-item.expandido .nav-arrow{transform:rotate(90deg);color:var(--brand-ink)}

/* ── SUB-ITENS (TV) ── */
.nav-sub{max-height:0;overflow:hidden;transition:max-height .3s ease}
.nav-sub.aberto{max-height:300px}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 4px 6px 58px}
.sub-item{
  display:flex;align-items:center;gap:8px;
  padding:11px 12px;border-radius:10px;
  background:var(--surface-2);border:1px solid var(--border);
  text-decoration:none;color:var(--ink-2);font-size:12px;font-weight:600;
  transition:background .15s ease,border-color .15s ease,color .15s ease;
}
.sub-item:hover{background:#FFF6D8;border-color:#FFE38A;color:var(--brand-ink)}
.sub-item span:first-child{font-size:15px}

/* ── DIVISOR ── */
.nav-div{height:1px;background:var(--border);margin:10px 6px}

/* ── RODAPÉ ── */
.rodape{margin-top:24px;z-index:1;position:relative}
.btn-sair{
  background:none;border:none;cursor:pointer;
  font-size:12px;color:var(--ink-3);font-family:var(--font);font-weight:600;
  letter-spacing:.6px;
  padding:8px 14px;border-radius:8px;
  transition:color .15s ease,background .15s ease;
}
.btn-sair:hover{color:var(--red);background:var(--red-bg)}

@media(max-width:420px){
  .painel{border-radius:16px}
  .sub-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topo">
  <img class="topo-logo" src="/logo.png" alt="Econômico">
  <div class="topo-nome">Econômico Relatórios</div>
</div>

<div class="painel">
<nav class="nav">

  <a class="nav-item" id="item-relatorios" href="/index.html">
    <div class="nav-icon">📊</div>
    <div class="nav-body">
      <div class="nav-title">Relatórios Estratégicos</div>
      <div class="nav-desc">Faturamento · Margem · Top produtos</div>
    </div>
    <span class="nav-arrow">▶</span>
  </a>

  <a class="nav-item" id="item-gerencial" href="/gestao-gerencial.html">
    <div class="nav-icon">📈</div>
    <div class="nav-body">
      <div class="nav-title">Gestão Gerencial</div>
      <div class="nav-desc">KPIs · Meta · Mercadológico · Avaria</div>
    </div>
    <span class="nav-arrow">▶</span>
  </a>

  <div class="nav-item" id="btn-tv" onclick="toggleTV()">
    <div class="nav-icon">📺</div>
    <div class="nav-body">
      <div class="nav-title">Painéis TV</div>
      <div class="nav-desc">Supervisão · Diretoria · Compras · Precificação</div>
    </div>
    <span class="nav-arrow" id="arrow-tv">▶</span>
  </div>
  <div class="nav-sub" id="sub-tv">
    <div class="sub-grid">
      <a class="sub-item" href="/supervisao.html"><span>🎛️</span>Todos Setores</a>
      <a class="sub-item" href="/diretoria.html"><span>🏪</span>Diretoria</a>
      <a class="sub-item" href="/compras.html"><span>🛒</span>Compras</a>
      <a class="sub-item" href="/precificacao.html"><span>💲</span>Precificação</a>
    </div>
  </div>

  <div class="nav-div"></div>

  <a class="nav-item" id="item-admin" href="/admin-usuarios.html" style="display:none">
    <div class="nav-icon">👥</div>
    <div class="nav-body">
      <div class="nav-title">Usuários</div>
      <div class="nav-desc">Gerenciar acessos e perfis</div>
    </div>
    <span class="nav-arrow">▶</span>
  </a>

</nav>
</div>

<div class="rodape">
  <button class="btn-sair" onclick="window.location.href='/api/logout'">Sair</button>
</div>

<script>
function toggleTV(){
  const sub=document.getElementById('sub-tv');
  const btn=document.getElementById('btn-tv');
  const arrow=document.getElementById('arrow-tv');
  const aberto=sub.classList.toggle('aberto');
  btn.classList.toggle('expandido',aberto);
}
fetch('/api/me').then(r=>r.json()).then(u=>{
  if(u.perfil==='admin'){
    document.getElementById('item-admin').style.display='flex';
  } else if(u.perfil==='gerencial'){
    document.querySelectorAll('.nav-item:not(#item-gerencial), .nav-div, .nav-sub').forEach(el=>el.style.display='none');
  } else if(u.perfil==='comprador'){
    document.querySelectorAll('.nav-item:not(#item-relatorios), .nav-div, .nav-sub').forEach(el=>el.style.display='none');
  }
});
</script>
</body>
</html>
