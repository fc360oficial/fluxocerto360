<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Precificação — FC360</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--card:#12121a;--border:rgba(255,255,255,.07);
  --text:#f0f0f5;--text2:#a0a0b0;--text3:#505060;
  --red:#ef4444;--orange:#f97316;--green:#22c55e;--yellow:#ffc600;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* HEADER */
.header{
  padding:10px 20px;display:flex;align-items:center;gap:16px;
  border-bottom:1px solid var(--border);flex-shrink:0;
  background:linear-gradient(180deg,rgba(255,198,0,.04),transparent);
}
.logo{height:32px;width:auto}
.h-info{display:flex;flex-direction:column;gap:1px}
.h-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:900;
  color:var(--yellow);letter-spacing:1.5px;text-transform:uppercase}
.h-sub{font-size:10px;color:var(--text3);font-weight:600;
  text-transform:uppercase;letter-spacing:1.5px}
.h-clock{margin-left:auto;text-align:right}
.clock-time{font-family:'Syne',sans-serif;font-size:30px;font-weight:900;color:var(--text);line-height:1}
.clock-date{font-size:10px;color:var(--text3);font-weight:600;margin-top:2px}

/* STATS BAR */
.stats{
  padding:6px 20px;display:flex;align-items:center;gap:20px;
  border-bottom:1px solid var(--border);flex-shrink:0;
  background:rgba(0,0,0,.3);
}
.stat{display:flex;align-items:center;gap:6px}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sdot.r{background:var(--red)}
.sdot.o{background:var(--orange)}
.stat-label{font-size:11px;color:var(--text3);font-weight:500}
.stat-val{font-size:14px;font-weight:800}
.stat-val.r{color:var(--red)}
.stat-val.o{color:var(--orange)}
.stat-sep{width:1px;height:16px;background:var(--border)}
.last-upd{margin-left:auto;font-size:10px;color:var(--text3)}

/* GRID */
.grid{
  display:grid;grid-template-columns:repeat(6,1fr);
  gap:8px;padding:8px;flex:1;overflow:hidden;min-height:0;
}
.col{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden;
}
.col-head{
  padding:7px 10px;text-align:center;flex-shrink:0;
  background:rgba(255,198,0,.06);border-bottom:1px solid rgba(255,198,0,.12);
}
.col-loja{font-family:'Syne',sans-serif;font-size:13px;font-weight:900;
  color:var(--yellow);letter-spacing:.5px}
.col-sub{font-size:9px;color:var(--text3);font-weight:600;margin-top:1px}
.col-body{flex:1;overflow-y:auto;padding:4px;min-height:0}
.col-body::-webkit-scrollbar{width:2px}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:1px}

.item{
  display:flex;align-items:center;gap:5px;
  padding:4px 7px;border-radius:5px;margin-bottom:2px;
}
.item.neg{background:rgba(239,68,68,.10);border-left:3px solid var(--red)}
.item.baixo{background:rgba(249,115,22,.08);border-left:3px solid var(--orange)}
.item-info{flex:1;min-width:0}
.item-desc{font-size:10px;font-weight:500;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-cod{font-size:9px;color:var(--text3);font-weight:600;margin-top:1px}
.item-pct{font-size:11px;font-weight:800;min-width:44px;text-align:right;flex-shrink:0}
.item.neg .item-pct{color:var(--red)}
.item.baixo .item-pct{color:var(--orange)}

.empty{padding:24px 8px;text-align:center;color:var(--text3);font-size:11px}
.empty-icon{font-size:22px;margin-bottom:6px}

.loading{padding:24px 8px;text-align:center;color:var(--text3);font-size:10px}
</style>
</head>
<body>

<div class="header">
  <img class="logo" src="/logo.png" onerror="this.style.display='none'">
  <div class="h-info">
    <div class="h-title">Precificação</div>
    <div class="h-sub">Margens críticas · Vendas do dia por loja</div>
  </div>
  <div class="h-clock">
    <div class="clock-time" id="clock">--:--:--</div>
    <div class="clock-date" id="cdate"></div>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <div class="sdot r"></div>
    <span class="stat-label">Margem negativa</span>
    <span class="stat-val r" id="tot-neg">—</span>
  </div>
  <div class="stat-sep"></div>
  <div class="stat">
    <div class="sdot o"></div>
    <span class="stat-label">0% a 19,99%</span>
    <span class="stat-val o" id="tot-baixo">—</span>
  </div>
  <div class="stat-sep"></div>
  <div class="stat">
    <span class="stat-label">Total alertas</span>
    <span class="stat-val" id="tot-total" style="color:var(--text2)">—</span>
  </div>
  <div class="last-upd" id="last-upd"></div>
</div>

<div class="grid" id="grid">
  <div class="loading">Carregando...</div>
</div>

<script>
const LOJAS = {1:'Loja 1',2:'Loja 2',3:'Loja 3',4:'Loja 4',5:'Loja 5',6:'Loja 6'};

function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('pt-BR');
  document.getElementById('cdate').textContent = n.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
}
setInterval(tick, 1000); tick();

async function load() {
  try {
    const r = await fetch('/api/precificacao/margens-criticas');
    const data = await r.json();

    let totNeg = 0, totBaixo = 0;
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    for (let ln = 1; ln <= 6; ln++) {
      const items = data[ln] || [];
      const neg   = items.filter(i => i.margem < 0);
      const baixo = items.filter(i => i.margem >= 0);
      totNeg   += neg.length;
      totBaixo += baixo.length;

      const col = document.createElement('div');
      col.className = 'col';

      let body = '';
      if (items.length === 0) {
        body = `<div class="empty"><div class="empty-icon">✅</div>Sem alertas</div>`;
      } else {
        body = items.map(i => `
          <div class="item ${i.margem < 0 ? 'neg' : 'baixo'}" title="${i.descricao} | R$ ${i.preco.toFixed(2)} | Custo R$ ${i.custo.toFixed(2)}">
            <div class="item-info">
              <div class="item-desc">${i.descricao}</div>
              <div class="item-cod">${i.codigo}</div>
            </div>
            <span class="item-pct">${i.margem}%</span>
          </div>`).join('');
      }

      col.innerHTML = `
        <div class="col-head">
          <div class="col-loja">${LOJAS[ln]}</div>
          <div class="col-sub">${neg.length} neg · ${baixo.length} baixo</div>
        </div>
        <div class="col-body">${body}</div>`;
      grid.appendChild(col);
    }

    document.getElementById('tot-neg').textContent   = totNeg;
    document.getElementById('tot-baixo').textContent = totBaixo;
    document.getElementById('tot-total').textContent = totNeg + totBaixo;
    document.getElementById('last-upd').textContent  = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="loading">Erro ao carregar dados.</div>';
  }
}

load();
setInterval(load, 3 * 60 * 1000);
</script>
</body>
</html>
