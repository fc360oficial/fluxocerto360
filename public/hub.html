<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Econômico Relatórios — Início</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08111F;--bg2:#0d1a2e;
  --card:#111827;--card-h:#141f33;
  --brand:#FACC15;
  --green:#22C55E;--red:#EF4444;--blue:#3B82F6;--violet:#8B5CF6;
  --text:#F1F5F9;--text2:#94A3B8;--text3:#475569;
  --border:rgba(255,255,255,.07);--border-md:rgba(255,255,255,.12);
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
html,body{min-height:100%;font-family:var(--font);background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 16px}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 80% 0%,rgba(250,204,21,.04) 0%,transparent 60%),
             radial-gradient(ellipse 40% 60% at 0% 80%,rgba(59,130,246,.04) 0%,transparent 60%);
}

/* ── TOPO ── */
.topo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px;z-index:1;position:relative}
.topo-logo{height:56px;filter:brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(-8deg)}
.topo-nome{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--text3);text-transform:uppercase}

/* ── CONTAINER ── */
.nav{width:100%;max-width:380px;z-index:1;position:relative;display:flex;flex-direction:column;gap:2px}

/* ── SEÇÃO ── */
.nav-section{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;padding:16px 4px 6px;margin-top:4px}
.nav-section:first-child{padding-top:0}

/* ── ITEM ── */
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-radius:10px;
  text-decoration:none;color:var(--text2);
  background:var(--card);border:1px solid var(--border);
  transition:background .15s,border-color .15s,color .15s;
  cursor:pointer;user-select:none;
}
.nav-item:hover,.nav-item.ativo{
  background:var(--card-h);border-color:var(--border-md);color:var(--text);
}
.nav-icon{
  width:34px;height:34px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:17px;
}
.ic-yellow{background:rgba(250,204,21,.12);border:1px solid rgba(250,204,21,.2)}
.ic-blue{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.2)}
.ic-green{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.2)}
.ic-violet{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.2)}
.ic-slate{background:rgba(100,116,139,.1);border:1px solid rgba(100,116,139,.2)}
.nav-body{flex:1;min-width:0}
.nav-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.nav-desc{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-arrow{font-size:10px;color:var(--text3);flex-shrink:0;transition:transform .25s,color .15s}
.nav-item:hover .nav-arrow,.nav-item.ativo .nav-arrow{color:var(--brand)}
.nav-item.expandido .nav-arrow{transform:rotate(90deg);color:var(--brand)}

/* ── SUB-ITENS (TV) ── */
.nav-sub{
  max-height:0;overflow:hidden;
  transition:max-height .3s ease;
}
.nav-sub.aberto{max-height:300px}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 0 4px 46px}
.sub-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:8px;
  background:var(--bg2);border:1px solid var(--border);
  text-decoration:none;color:var(--text3);font-size:11px;font-weight:600;
  transition:background .15s,color .15s,border-color .15s;
}
.sub-item:hover{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.25);color:#93c5fd}
.sub-item span:first-child{font-size:15px}

/* ── DIVISOR ── */
.nav-div{height:1px;background:var(--border);margin:8px 0}

/* ── RODAPÉ ── */
.rodape{margin-top:20px;z-index:1;position:relative}
.btn-sair{
  background:none;border:none;cursor:pointer;
  font-size:11px;color:var(--text3);font-family:var(--font);
  letter-spacing:1px;text-transform:uppercase;
  padding:6px 12px;border-radius:6px;
  transition:color .15s,background .15s;
}
.btn-sair:hover{color:var(--red);background:rgba(239,68,68,.06)}
</style>
</head>
<body>

<div class="topo">
  <img class="topo-logo" src="/logo.png" alt="Econômico">
  <div class="topo-nome">Econômico Relatórios</div>
</div>

<nav class="nav">

  <a class="nav-item" href="/index.html">
    <div class="nav-icon ic-blue">📊</div>
    <div class="nav-body">
      <div class="nav-title">Relatórios Estratégicos</div>
      <div class="nav-desc">Faturamento · Margem · Top produtos</div>
    </div>
    <span class="nav-arrow">▶</span>
  </a>

  <a class="nav-item" id="item-gerencial" href="/gestao-gerencial.html">
    <div class="nav-icon ic-green">📈</div>
    <div class="nav-body">
      <div class="nav-title">Gestão Gerencial</div>
      <div class="nav-desc">KPIs · Meta · Mercadológico · Avaria</div>
    </div>
    <span class="nav-arrow">▶</span>
  </a>

  <div class="nav-item" id="btn-tv" onclick="toggleTV()">
    <div class="nav-icon ic-slate">📺</div>
    <div class="nav-body">
      <div class="nav-title">Painéis TV</div>
      <div class="nav-desc">Supervisão · Diretoria · Compras · Precificação</div>
    </div>
    <span class="nav-arrow" id="arrow-tv">▶</span>
  </div>
  <div class="nav-sub" id="sub-tv">
    <div class="sub-grid">
      <a class="sub-item" href="/supervisao.html"><span>🎛️</span>Todos Setores</a>
      <a class="sub-item" href="/diretoria.html"><span>🏪</span>Diretoria</a>
      <a class="sub-item" href="/compras.html"><span>🛒</span>Compras</a>
      <a class="sub-item" href="/precificacao.html"><span>💲</span>Precificação</a>
    </div>
  </div>

  <div class="nav-div"></div>

  <a class="nav-item" id="item-admin" href="/admin-usuarios.html" style="display:none">
    <div class="nav-icon ic-violet">👥</div>
    <div class="nav-body">
      <div class="nav-title">Usuários</div>
      <div class="nav-desc">Gerenciar acessos e perfis</div>
    </div>
    <span class="nav-arrow">▶</span>
  </a>

</nav>

<div class="rodape">
  <button class="btn-sair" onclick="window.location.href='/api/logout'">Sair</button>
</div>

<script>
function toggleTV(){
  const sub=document.getElementById('sub-tv');
  const btn=document.getElementById('btn-tv');
  const arrow=document.getElementById('arrow-tv');
  const aberto=sub.classList.toggle('aberto');
  btn.classList.toggle('expandido',aberto);
}
fetch('/api/me').then(r=>r.json()).then(u=>{
  if(u.perfil==='admin'){
    document.getElementById('item-admin').style.display='flex';
  } else if(u.perfil==='gerencial'){
    // Esconde tudo exceto Gestão Gerencial
    document.querySelectorAll('.nav-item:not(#item-gerencial), .nav-div, .nav-sub').forEach(el=>el.style.display='none');
  }
});
</script>
</body>
</html>
