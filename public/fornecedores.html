<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/design-system.css">
<script src="/nav.js" defer></script>
<title>Análise Lista de Compras</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'InterVar','Segoe UI',sans-serif;background:#EAEBE3;color:#0E1626;min-height:100vh;overflow-x:hidden}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;height:100vh;width:236px;background:#FFFFFF;border-right:1px solid #D8D9CF;display:flex;flex-direction:column;z-index:50}
.sidebar-logo{padding:22px 20px 14px;border-bottom:1px solid #D8D9CF}
.sidebar-logo h2{font-size:15px;color:#6B4E00;font-weight:700;letter-spacing:0.5px}
.sidebar-logo p{font-size:11px;color:#4E5A72;margin-top:2px}
.sidebar-nav{padding:10px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#4E5A72;text-decoration:none;font-size:13px;font-weight:500;transition:all .15s}
.nav-item:hover{background:#D8D9CF;color:#0E1626}
.nav-item.active{background:#F5B80018;color:#6B4E00;border-right:3px solid #F5B800}
.nav-item .ic{font-size:15px;width:20px;text-align:center}

/* LAYOUT */
.main{margin-left:0;padding:24px;transition:margin-right .3s}
.main.drawer-open{margin-right:55%}

/* HEADER */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.page-hdr h1{font-size:21px;font-weight:700;color:#0E1626}
.page-hdr p{font-size:12px;color:#4E5A72;margin-top:2px}

/* FILTROS */
.filtros{background:#FFFFFF;border:1px solid #D8D9CF;border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;color:#4E5A72;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fg select,.fg input{background:#EAEBE3;border:1px solid #D8D9CF;border-radius:7px;color:#0E1626;padding:7px 11px;font-size:13px;outline:none;min-width:120px}
.fg select:focus,.fg input:focus{border-color:#F5B800}
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;align-self:flex-end;white-space:nowrap}
.btn-blue{background:#F5B800;color:#6B4E00;font-weight:700}.btn-blue:hover{background:#E5AC00}
.btn-slate{background:#D8D9CF;color:#0E1626}.btn-slate:hover{background:#98A0B3}

/* KPI CARDS */
.kpi-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.kpi{background:#FFFFFF;border:1px solid #D8D9CF;border-radius:10px;padding:12px 16px;display:flex;flex-direction:column;gap:2px;min-width:130px}
.kpi .v{font-size:20px;font-weight:700}
.kpi .l{font-size:10px;color:#4E5A72}

/* INSIGHTS */
.insights{background:#EAEBE3;border:1px solid #E9EEF3;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.insight-chip{background:#E2E3DA;border:1px solid #E9EEF3;border-radius:8px;padding:6px 12px;font-size:11px;color:#4E5A72;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .15s;user-select:none}
.insight-chip:hover{border-color:#0E1626;background:#E9EEF3;transform:translateY(-1px)}
.insight-chip.warn{background:#FBEDDD;border-color:#B45C00;color:#B45C00}
.insight-chip.warn:hover{background:#F8DFC0;border-color:#B45C00}
.insight-chip.danger{background:#FBEAED;border-color:#F3C1CB;color:#C22F49}
.insight-chip.danger:hover{background:#F8D3DA;border-color:#C22F49}
.insight-chip.active-filter{box-shadow:0 0 0 2px #F5B800;border-color:#F5B800 !important;color:#6B4E00 !important}
.chip-clear{background:#D8D9CF;border:1px solid #98A0B3;border-radius:8px;padding:6px 12px;font-size:11px;color:#4E5A72;cursor:pointer;transition:all .15s}
.chip-clear:hover{background:#98A0B3;color:#0E1626}

/* TABELA PRINCIPAL */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid #D8D9CF}
table.main-t{width:100%;border-collapse:collapse;font-size:13px}
table.main-t thead{background:#EAEBE3;position:sticky;top:0;z-index:10}
table.main-t th{padding:10px 14px;text-align:left;color:#4E5A72;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid #D8D9CF}
table.main-t th.r{text-align:right}
table.main-t td{padding:9px 14px;border-bottom:1px solid #D8D9CF;vertical-align:middle}
table.main-t tbody tr{transition:background .1s}
table.main-t tbody tr:hover{background:#ffffff08}
table.main-t tbody tr.selected{background:#F5B80012;border-left:3px solid #F5B800}
.td-r{text-align:right}
.td-link{cursor:pointer;text-decoration:none;transition:color .15s}
.td-link:hover{text-decoration:underline}
.nome-fornec{cursor:pointer;font-weight:600;color:#0E1626}.nome-fornec:hover{color:#6B4E00}
.td-venda{cursor:pointer;color:#6B4E00;font-weight:700}.td-venda:hover{color:#B45C00}
.td-margem{font-weight:700;cursor:pointer}
.td-avaria{cursor:pointer;font-weight:600}
.rank{font-size:11px;width:24px;text-align:center;color:#4E5A72}

/* MARGEM COLORS */
.m-great{color:#137A48}.m-ok{color:#a3e635}.m-warn{color:#B45C00}.m-bad{color:#C22F49}
/* AVARIA COLORS */
.av-ok{color:#4E5A72}.av-warn{color:#B45C00}.av-bad{color:#C22F49}

/* BARRA MINI */
.mini-bar{height:4px;border-radius:2px;background:#D8D9CF;margin-top:4px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;background:#0E1626}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:#00000066;z-index:198;display:none}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:0;width:55%;height:100vh;background:#FFFFFF;border-left:1px solid #D8D9CF;z-index:199;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;overflow:hidden}
.drawer.open{transform:translateX(0)}

.drawer-hdr{padding:16px 20px;border-bottom:1px solid #D8D9CF;display:flex;align-items:flex-start;gap:12px;background:#EAEBE355;flex-shrink:0}
.drawer-hdr-info{flex:1;min-width:0}
.drawer-hdr-info h2{font-size:15px;font-weight:700;color:#0E1626;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drawer-hdr-info p{font-size:11px;color:#4E5A72;margin-top:2px}
.btn-close{background:transparent;border:1px solid #D8D9CF;color:#4E5A72;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;flex-shrink:0}
.btn-close:hover{background:#D8D9CF;color:#0E1626}

.drawer-tabs{display:flex;border-bottom:1px solid #D8D9CF;background:#EAEBE344;flex-shrink:0;overflow-x:auto}
.dtab{padding:10px 16px;font-size:12px;font-weight:600;color:#4E5A72;background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.dtab:hover{color:#0E1626}
.dtab.active{color:#0E1626;border-bottom-color:#0E1626}

.drawer-body{flex:1;overflow-y:auto;padding:0}

/* DRAWER CONTENT */
.d-section{padding:14px 18px;border-bottom:1px solid #D8D9CF}
.d-kpis{display:flex;gap:8px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid #D8D9CF;background:#EAEBE322}
.d-kpi{background:#EAEBE3;border:1px solid #D8D9CF;border-radius:8px;padding:8px 12px;display:flex;flex-direction:column;gap:2px;min-width:100px}
.d-kpi .dv{font-size:16px;font-weight:700}.d-kpi .dl{font-size:10px;color:#4E5A72}

/* DRAWER TABLE */
.d-table-wrap{overflow-x:auto}
table.d-t{width:100%;border-collapse:collapse;font-size:12px}
table.d-t thead{background:#EAEBE3;position:sticky;top:0}
table.d-t th{padding:8px 12px;text-align:left;color:#4E5A72;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;border-bottom:1px solid #D8D9CF}
table.d-t th.r{text-align:right}
table.d-t td{padding:7px 12px;border-bottom:1px solid #D8D9CF22;vertical-align:middle}
table.d-t tbody tr:hover{background:#ffffff06}
.d-t .cod{color:#98A0B3;font-size:10px;font-family:monospace}
.d-t .desc{font-weight:500;color:#0E1626}
.d-t .r{text-align:right}
.badge-rank{display:inline-block;font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px;margin-left:4px}
.br-gold{background:#B45C00;color:#B45C00}
.br-silver{background:#E2E3DA;color:#4E5A72}
.br-green{background:#14532d;color:#137A48}

/* LOJA COMPARATIVO */
.loja-row{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid #D8D9CF22;cursor:default}
.loja-row:hover{background:#ffffff06}
.loja-label{font-size:12px;font-weight:700;color:#4E5A72;min-width:52px}
.loja-bar-wrap{flex:1;height:6px;background:#FFFFFF;border-radius:3px;overflow:hidden}
.loja-bar-fill{height:100%;border-radius:3px;background:#0E1626;transition:width .4s ease}
.loja-val{font-size:12px;font-weight:700;color:#0E1626;min-width:90px;text-align:right}
.loja-msv{font-size:11px;min-width:54px;text-align:right}
.loja-av{font-size:11px;min-width:70px;text-align:right}
.badge-loja{font-size:9px;font-weight:700;border-radius:3px;padding:1px 5px;margin-left:4px}
.bl-gold{background:#B45C00;color:#B45C00}
.bl-green{background:#14532d;color:#137A48}
.bl-blue{background:#E9EEF3;color:#4E5A72}

/* FILTRO RÁPIDO */
.quick-filters{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid #D8D9CF;background:#EAEBE333}
.qf-btn{border:1px solid #D8D9CF;background:transparent;color:#4E5A72;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;transition:all .15s}
.qf-btn:hover,.qf-btn.active{background:#E9EEF3;border-color:#0E1626;color:#4E5A72}

/* ABAS PRINCIPAIS */
.main-tabs{display:flex;gap:0;border-bottom:2px solid #D8D9CF;margin-bottom:16px}
.mtab{background:transparent;border:none;padding:10px 20px;font-size:13px;font-weight:600;color:#4E5A72;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.mtab:hover{color:#0E1626}
.mtab.active{color:#0E1626;border-bottom-color:#F5B800}

/* COMPRAS POR COMPRADOR */
.comp-cards{display:flex;flex-direction:column;gap:12px}
.comp-card{background:#EAEBE3;border:1px solid #D8D9CF;border-radius:10px;overflow:hidden}
.comp-card-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .1s}
.comp-card-hdr:hover{background:#ffffff05}
.comp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.comp-nome{font-size:14px;font-weight:700;color:#0E1626;flex:1}
.comp-total{font-size:16px;font-weight:800;color:#0E1626;font-variant-numeric:tabular-nums}
.comp-pct{font-size:11px;color:#4E5A72;margin-left:4px}
.comp-bar-wrap{flex:1;max-width:160px;height:5px;background:#D8D9CF;border-radius:3px;overflow:hidden}
.comp-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.comp-chev{color:#98A0B3;font-size:12px;transition:transform .2s;flex-shrink:0}
.comp-card.open .comp-chev{transform:rotate(180deg)}
.comp-body{display:none;border-top:1px solid #D8D9CF}
.comp-card.open .comp-body{display:block}
.comp-table-wrap{overflow-x:auto}
table.comp-t{width:100%;border-collapse:collapse;font-size:12px}
table.comp-t th{padding:8px 14px;text-align:left;color:#98A0B3;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #D8D9CF;background:#E2E3DA;white-space:nowrap}
table.comp-t th.r{text-align:right}
table.comp-t td{padding:8px 14px;border-bottom:1px solid #EAEBE3;vertical-align:middle;color:#0E1626}
table.comp-t td.r{text-align:right;font-variant-numeric:tabular-nums}
table.comp-t tr:last-child td{border-bottom:none}
table.comp-t tr:hover td{background:#ffffff05}
.comp-t .link-lista{color:#0E1626;font-size:10px;cursor:pointer;margin-left:6px}
.comp-t .link-lista:hover{text-decoration:underline}
.comp-resumo{padding:14px 18px;display:flex;gap:20px;flex-wrap:wrap;background:#E2E3DA;border-bottom:1px solid #D8D9CF}
.comp-resumo-item{font-size:11px;color:#4E5A72}
.comp-resumo-item span{color:#0E1626;font-weight:700}

/* UTILS */
.spinner{width:22px;height:22px;border-radius:50%;border:2px solid #D8D9CF;border-top-color:#0E1626;animation:spin .7s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:30px;text-align:center;color:#98A0B3;font-size:13px}

/* PRINT */
.btn-print{background:#FFFFFF;border:1px solid #D8D9CF;color:#4E5A72;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;flex-shrink:0;transition:all .15s}
.btn-print:hover{background:#D8D9CF;color:#0E1626}
.print-header{display:none}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  /* Esconde tudo exceto o drawer */
  body > *:not(#drawer){display:none!important}
  .sidebar,.drawer-overlay,.btn-close,.btn-print,.drawer-tabs,.quick-filters{display:none!important}
  /* Reset do body e drawer para impressão */
  html,body{background:#fff!important;color:#000!important;height:auto!important;overflow:visible!important}
  #drawer{
    position:static!important;transform:none!important;
    width:100%!important;height:auto!important;max-height:none!important;
    border:none!important;background:#fff!important;
    overflow:visible!important;display:block!important;
  }
  .drawer-hdr{
    background:#fff!important;border-bottom:2px solid #F5B800!important;
    padding:8px 0 12px!important;margin-bottom:14px;display:flex!important;
  }
  .drawer-hdr-info h2{color:#EAEBE3!important;font-size:17px!important}
  .drawer-hdr-info p{color:#98A0B3!important;font-size:11px!important}
  .print-header{
    display:flex!important;align-items:center;gap:14px;
    margin-bottom:14px;padding-bottom:12px;border-bottom:3px solid #F5B800;
  }
  .print-header img{height:36px;width:auto;filter:brightness(0)}
  .print-header-txt h1{font-size:17px;font-weight:800;color:#EAEBE3;letter-spacing:-.3px}
  .print-header-txt p{font-size:11px;color:#98A0B3;margin-top:2px}
  .drawer-body{overflow:visible!important;height:auto!important;max-height:none!important}
  .d-kpis{background:#0E1626!important;border:1px solid #0E1626!important;border-radius:8px;margin-bottom:12px}
  .d-kpi{background:#fff!important;border:1px solid #0E1626!important}
  .d-kpi .dv{color:#EAEBE3!important}.d-kpi .dl{color:#4E5A72!important}
  .d-section{border-bottom:1px solid #0E1626!important}
  table.d-t{color:#EAEBE3!important;border-collapse:collapse}
  table.d-t th{color:#98A0B3!important;background:#0E1626!important;border-bottom:1px solid #0E1626!important;border:1px solid #0E1626!important}
  table.d-t td{border:1px solid #0E1626!important;color:#EAEBE3!important}
  .d-t .cod{color:#4E5A72!important}.d-t .desc{color:#EAEBE3!important}
  .m-great{color:#137A48!important}.m-ok{color:#65a30d!important}.m-warn{color:#B45C00!important}.m-bad{color:#dc2626!important}
  .loja-row{border-bottom:1px solid #0E1626!important}
  .loja-label{color:#98A0B3!important}.loja-val{color:#1d4ed8!important}
  .loja-bar-wrap{background:#0E1626!important}.loja-bar-fill{background:#0E1626!important}
  .print-footer{display:block!important;margin-top:20px;padding-top:8px;border-top:1px solid #0E1626;font-size:10px;color:#4E5A72;text-align:right}
  .spinner,.empty{display:none!important}
  @page{margin:14mm 12mm;size:A4 portrait}
}
.tag-sem-giro{background:#F3C1CB;color:#C22F49;font-size:9px;font-weight:700;border-radius:3px;padding:1px 4px;margin-left:4px}
.tag-est-baixo{background:#B45C00;color:#B45C00;font-size:9px;font-weight:700;border-radius:3px;padding:1px 4px;margin-left:4px}
.tag-neg{background:#500000;color:#C22F49;font-size:9px;font-weight:700;border-radius:3px;padding:1px 4px;margin-left:4px}

/* LISTA TAGS */
.loja-badge{display:inline-block;background:#E9EEF333;border:1px solid #E9EEF366;border-radius:4px;padding:1px 5px;font-size:10px;color:#4E5A72;margin:1px;font-weight:700}
.comp-tag{display:inline-block;background:#E9EEF322;border:1px solid #E9EEF355;border-radius:4px;padding:1px 6px;font-size:10px;color:#4E5A72;margin:1px}
.nome-lista{cursor:pointer;font-weight:600;color:#0E1626}.nome-lista:hover{color:#6B4E00;text-decoration:underline}
.itens-badge{display:inline-block;background:#F5B80022;border:1px solid #F5B80055;border-radius:6px;padding:2px 8px;font-size:12px;color:#6B4E00;font-weight:700}

@media (max-width:768px){
  /* SIDEBAR → top bar */
  .sidebar{width:100%;height:auto;position:relative;flex-direction:column;border-right:none;border-bottom:1px solid #D8D9CF}
  .sidebar-logo{padding:8px 12px;border-bottom:none;display:flex;align-items:center}
  .sidebar-logo img{width:100px !important;height:auto !important}
  .sidebar-logo h2,.sidebar-logo p{display:none}
  .sidebar-nav{padding:5px 8px 8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;width:100%}
  .nav-item{padding:7px 6px;font-size:10px;border-radius:6px;gap:4px;justify-content:center;text-align:center}
  .nav-item .ic{font-size:12px;width:auto}
  .nav-item.active{border-right:none;border-bottom:2px solid #F5B800}

  /* MAIN */
  .main{margin-left:0;padding:10px}
  .main.drawer-open{margin-right:0}
  .page-hdr{margin-bottom:12px;gap:8px}
  .page-hdr h1{font-size:16px}
  .page-hdr>button{display:none}

  /* FILTROS */
  .filtros{gap:8px}
  .fg select,.fg input{min-width:80px;font-size:16px}

  /* KPIs — 2 por linha */
  .kpi-row{gap:8px}
  .kpi{min-width:calc(50% - 5px);flex:1;padding:10px 12px}
  .kpi .v{font-size:15px}

  /* INSIGHTS */
  .insights{gap:5px}
  .insight-chip{font-size:10px;padding:5px 8px}

  /* TABLE — scroll horizontal, fonte menor */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.main-t{min-width:700px}
  table.main-t th,table.main-t td{padding:6px 8px;font-size:10px;white-space:nowrap}

  /* DRAWER */
  .drawer{width:100%;top:auto;bottom:0;height:85vh;transform:translateY(100%)}
  .drawer.open{transform:translateY(0)}
}
@media print{
  .sidebar,.filtros,.drawer,.drawer-overlay,.insights{display:none!important}
  .main{margin-left:0;margin-right:0;padding:10px}
  body{background:#fff;color:#000}
  table.main-t th,table.main-t td{color:#000;border-color:#ccc}
}
</style>
</head>
<body class="ds">

<div class="main" id="main">
  <div class="page-hdr">
    <div>
      <h1>📋 Análise Lista de Compras</h1>
      <p>Desempenho por fornecedor · Drill Down completo</p>
    </div>
    <button class="btn btn-slate" onclick="window.print()">🖨 Imprimir</button>
  </div>

  <div class="filtros">
    <div class="fg">
      <label>Loja</label>
      <select id="fil-loja" onchange="onFiltroComprasChange()">
        <option value="1">Loja 1</option><option value="2">Loja 2</option>
        <option value="3">Loja 3</option><option value="4">Loja 4</option>
        <option value="5">Loja 5</option><option value="6">Loja 6</option>
      </select>
    </div>
    <div class="fg">
      <label>Mês</label>
      <select id="fil-mes" onchange="onFiltroComprasChange()">
        <option value="1">Janeiro</option><option value="2">Fevereiro</option>
        <option value="3">Março</option><option value="4">Abril</option>
        <option value="5">Maio</option><option value="6">Junho</option>
        <option value="7">Julho</option><option value="8">Agosto</option>
        <option value="9">Setembro</option><option value="10">Outubro</option>
        <option value="11">Novembro</option><option value="12">Dezembro</option>
      </select>
    </div>
    <div class="fg">
      <label>Ano</label>
      <select id="fil-ano" onchange="onFiltroComprasChange()"><option value="2026">2026</option><option value="2025">2025</option></select>
    </div>
    <div class="fg" id="fg-fornecedor">
      <label>Fornecedor</label>
      <input type="text" id="fil-busca" placeholder="buscar..." onkeydown="if(event.key==='Enter')carregar()">
    </div>
    <div class="fg" id="fg-comprador">
      <label>Comprador</label>
      <select id="fil-comprador">
        <option value="">Todos</option>
      </select>
    </div>
    <button class="btn btn-blue" id="btn-buscar" onclick="carregar()">🔍 Buscar</button>
  </div>

  <div class="kpi-row" id="kpi-row"></div>
  <div class="insights" id="insights-box" style="display:none"></div>

  <div class="main-tabs">
    <button class="mtab active" id="tab-ranking" onclick="trocarAba('ranking')">📊 Ranking Fornecedores</button>
    <button class="mtab" id="tab-compras" onclick="trocarAba('compras')">📦 Compras por Comprador</button>
  </div>

  <!-- SEÇÃO RANKING (atual) -->
  <div id="sec-ranking">
  <div class="table-wrap">
    <table class="main-t" id="main-table">
      <thead>
        <tr>
          <th style="width:30px">#</th>
          <th>Lista / Fornecedor</th>
          <th>Comprador</th>
          <th class="r" title="Clique para detalhar">Venda R$</th>
          <th class="r" title="Clique para detalhar">Margem S/V</th>
          <th class="r" title="Clique para detalhar">Margem S/C</th>
          <th class="r" title="Clique para detalhar">Avaria R$</th>
          <th class="r">% Av/Venda</th>
          <th class="r">Itens Lista</th>
          <th class="r">C/ Venda</th>
        </tr>
      </thead>
      <tbody id="main-tbody"><tr><td colspan="10" style="padding:40px;text-align:center"><div class="spinner"></div></td></tr></tbody>
    </table>
  </div>
  </div><!-- /sec-ranking -->

  <!-- SEÇÃO COMPRAS POR COMPRADOR -->
  <div id="sec-compras" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div id="compras-kpi" style="display:flex;gap:12px;flex-wrap:wrap"></div>
      <button class="btn btn-slate" onclick="imprimirCompras()" style="flex-shrink:0">🖨️ Imprimir</button>
    </div>
    <div class="comp-cards" id="comp-cards"><div class="spinner"></div></div>
  </div>
</div>

<!-- OVERLAY -->
<div class="drawer-overlay" id="overlay" onclick="fecharDrawer()"></div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <div class="print-header">
    <img src="/logo.png" alt="Econômico">
    <div class="print-header-txt">
      <h1>Econômico Relatórios</h1>
      <p>Análise de Fornecedores · <span id="print-filtro"></span></p>
    </div>
  </div>
  <div class="drawer-hdr">
    <div class="drawer-hdr-info">
      <h2 id="d-title">Fornecedor</h2>
      <p id="d-subtitle">Loja X · Mês/Ano</p>
    </div>
    <button class="btn-print" onclick="imprimirDrawer()" title="Imprimir esta aba">🖨️ Imprimir</button>
    <button class="btn-close" onclick="fecharDrawer()">✕ Fechar</button>
  </div>
  <div class="drawer-tabs" id="d-tabs"></div>
  <div class="drawer-body" id="d-body"><div class="spinner"></div></div>
  <div class="print-footer" id="print-footer"></div>
</div>

<script>
const mesesNomes = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const fmt  = v => 'R$ ' + (+v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = v => (+v).toLocaleString('pt-BR',{maximumFractionDigits:0});
const pctFmt = v => v != null ? v.toFixed(1)+'%' : '—';

let dados = [];
let listas = [];
let totalLojaReal = 0;
let totalComFornecedor = 0;
let totalLucroReal = 0;
let margemLoja = 0;
let margemFornec = 0;
let avariaBreakdown = {};
let fornecSelecionado = null;
let listaSelecionada = null;
let cacheProds = {}, cacheAvaria = {}, cacheLojas = {};
let _filtroAtivo = null;

document.getElementById('fil-mes').value = new Date().getMonth() + 1;

function params() {
  return {
    loja:      document.getElementById('fil-loja').value,
    mes:       document.getElementById('fil-mes').value,
    ano:       document.getElementById('fil-ano').value,
    busca:     document.getElementById('fil-busca').value.trim(),
    comprador: document.getElementById('fil-comprador').value
  };
}

async function carregar() {
  fecharDrawer();
  _filtroAtivo = null;
  _comprasCache = null; _comprasCacheKey = '';
  cacheProds = {}; cacheAvaria = {}; cacheLojas = {};
  document.getElementById('main-tbody').innerHTML = '<tr><td colspan="10" style="padding:40px;text-align:center"><div class="spinner"></div></td></tr>';
  document.getElementById('kpi-row').innerHTML = '';
  document.getElementById('insights-box').style.display = 'none';

  const p = params();

  // KPIs: análise de fornecedores por loja/mês (sem filtro busca/comprador)
  try {
    const r = await fetch(`/api/fornecedores/resumo?loja=${p.loja}&mes=${p.mes}&ano=${p.ano}`);
    const json = await r.json();
    if (!json.error) {
      totalLojaReal = json.total_loja || 0;
      totalComFornecedor = json.total_com_fornecedor || 0;
      totalLucroReal = json.total_lucro_real || 0;
      margemLoja   = json.margem_loja   || 0;
      margemFornec = json.margem_fornec || 0;
      avariaBreakdown = json.avaria_breakdown || {};
      dados = json.fornecedores || [];
      renderKpis();
      renderInsights();
    }
  } catch(e) { console.error('KPI error:', e); }

  // Listas de compra (filtro por busca e comprador)
  try {
    const url = `/api/listas-compra?busca=${encodeURIComponent(p.busca)}&comprador=${encodeURIComponent(p.comprador)}`;
    const r = await fetch(url);
    const json = await r.json();
    if (json.error) throw new Error(json.error);
    listas = json.listas || [];
    if (json.compradores && json.compradores.length) {
      const sel = document.getElementById('fil-comprador');
      const cur = sel.value;
      sel.innerHTML = '<option value="">Todos</option>' +
        json.compradores.map(c => `<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
    }
    renderKpis();    // atualiza contagem de listas
    renderInsights(); // recalcula chips com contagem de listas
    renderListas();
  } catch(e) {
    document.getElementById('main-tbody').innerHTML = `<tr><td colspan="10" class="empty">Erro: ${e.message}</td></tr>`;
  }
}

function renderKpis() {
  const totalAvaria = dados.reduce((s,r)=>s+r.avaria,0);
  const cobertura   = totalLojaReal > 0 ? (totalComFornecedor / totalLojaReal * 100).toFixed(1) : '—';
  const gap         = totalLojaReal - totalComFornecedor;
  const pctGap      = totalLojaReal > 0 ? (gap / totalLojaReal * 100).toFixed(1) : '0.0';
  const { loja } = params();
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi"><div class="v">${listas.length||dados.length}</div><div class="l">Listas de Compra</div></div>
    <div class="kpi" title="Total real de todas as vendas da loja no mês">
      <div class="v" style="color:#2C4A6B">${fmt(totalLojaReal)}</div>
      <div class="l">Faturamento Total Loja ${loja}</div>
    </div>
    <div class="kpi" title="Vendas de produtos com fornecedor cadastrado (sem duplicata por fornecedor)">
      <div class="v" style="color:#0E1626">${fmt(totalComFornecedor)}</div>
      <div class="l">Faturamento c/ Fornecedor <span style="color:#B45C00;font-size:11px">(${cobertura}%)</span></div>
    </div>
    <div class="kpi" onclick="verSemFornecedor()" title="Produtos vendidos sem fornecedor cadastrado — clique para ver" style="cursor:pointer;border-color:#F3C1CB">
      <div class="v" style="color:#C22F49">${fmt(gap)}</div>
      <div class="l" style="color:#C22F49">Sem Fornecedor <span style="font-size:11px">(${pctGap}%) ▶</span></div>
    </div>
    <div class="kpi" title="Margem S/V de todos os produtos da loja (alinhada com ERP)">
      <div class="v" style="color:#137A48">${pctFmt(margemLoja)}</div>
      <div class="l">Margem S/V Loja</div>
    </div>
    <div class="kpi" onclick="verSemFornecedor()" title="Margem sem os produtos sem fornecedor cadastrado — clique para ver quais são" style="cursor:pointer;border-color:#137A48">
      <div class="v" style="color:#137A48">${pctFmt(margemFornec)}</div>
      <div class="l" style="color:#137A48">Margem s/ Fornec. <span style="font-size:10px">▶</span></div>
    </div>
    <div class="kpi" title="Lucro bruto: venda menos custo dos produtos c/ fornecedor (sem duplicata)">
      <div class="v" style="color:#0E1626">${fmt(totalLucroReal)}</div>
      <div class="l">Lucro Bruto c/ Fornec.</div>
    </div>
    <div class="kpi" style="min-width:170px" title="Total de avarias lançadas no período">
      <div class="v" style="color:#C22F49">${fmt(avariaBreakdown.total ?? totalAvaria)}</div>
      <div class="l">Total Avarias</div>
      <div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap">
        <span style="font-size:10px;background:#FFFFFF;border:1px solid #D8D9CF;border-radius:4px;padding:2px 6px;color:#B45C00">⏳ Ab. ${fmt(avariaBreakdown.em_aberto??0)}</span>
        <span style="font-size:10px;background:#FFFFFF;border:1px solid #D8D9CF;border-radius:4px;padding:2px 6px;color:#0E1626">🔄 Trâm. ${fmt(avariaBreakdown.em_tramite??0)}</span>
        <span style="font-size:10px;background:#FFFFFF;border:1px solid #D8D9CF;border-radius:4px;padding:2px 6px;color:#137A48">✅ Emit. ${fmt(avariaBreakdown.ja_emitido??0)}</span>
      </div>
    </div>
  `;
}

function renderInsights() {
  const box = document.getElementById('insights-box');
  if (!listas.length && !dados.length) { box.style.display='none'; return; }
  const chips = [];
  const { loja, mes } = params();
  const totalVenda = dados.reduce((s,r)=>s+r.venda,0);
  const baseRef    = totalLojaReal > 0 ? totalLojaReal : totalVenda;

  // Top fornecedor → filtra as listas dele
  const top = dados[0];
  if (top && baseRef > 0) {
    const pct      = (top.venda/baseRef*100).toFixed(1);
    const idsTop   = listas.filter(l=>l.codFornec===top.id).map(l=>l.id);
    chips.push(`<div class="insight-chip${_filtroAtivo==='top'?' active-filter':''}" onclick="filtrarListas('top',[${idsTop.join(',')}])" title="Ver listas deste fornecedor">
      🏆 <b>${top.nome}</b> · ${pct}% do faturamento · ${fmt(top.venda)}
    </div>`);
  }

  // Listas cujo fornecedor tem margem negativa
  const idsMargemNeg = new Set(dados.filter(r=>r.msv<0&&r.venda>0).map(r=>r.id));
  const listasMargemNeg = listas.filter(l=>idsMargemNeg.has(l.codFornec));
  if (listasMargemNeg.length) chips.push(`<div class="insight-chip danger${_filtroAtivo==='margem_neg'?' active-filter':''}" onclick="filtrarListas('margem_neg',[${listasMargemNeg.map(l=>l.id).join(',')}])" title="Ver listas de fornecedores com margem negativa">
    ⚠️ <b>${listasMargemNeg.length}</b> lista(s) · fornecedor(es) com margem negativa
  </div>`);

  // Listas cujo fornecedor tem avaria alta
  const idsAltaAv = new Set(dados.filter(r=>r.pct_av>5&&r.avaria>0).map(r=>r.id));
  const listasAltaAv = listas.filter(l=>idsAltaAv.has(l.codFornec));
  if (listasAltaAv.length) chips.push(`<div class="insight-chip warn${_filtroAtivo==='alta_av'?' active-filter':''}" onclick="filtrarListas('alta_av',[${listasAltaAv.map(l=>l.id).join(',')}])" title="Ver listas com alta avaria">
    🔴 <b>${listasAltaAv.length}</b> lista(s) · fornecedor(es) com avaria acima de 5%
  </div>`);

  // Listas sem faturamento no mês (fornecedor sem venda ou não encontrado)
  const listasSemVenda = listas.filter(l => {
    const s = dados.find(d=>d.id===l.codFornec);
    return !s || s.venda===0;
  });
  if (listasSemVenda.length) chips.push(`<div class="insight-chip${_filtroAtivo==='sem_venda'?' active-filter':''}" onclick="filtrarListas('sem_venda',[${listasSemVenda.map(l=>l.id).join(',')}])" title="Ver listas sem faturamento">
    📦 <b>${listasSemVenda.length}</b> lista(s) sem faturamento em ${mesesNomes[+mes]}
  </div>`);

  // Avaria total (informativo)
  const totalAv = dados.reduce((s,r)=>s+r.avaria,0);
  if (totalVenda>0) chips.push(`<div class="insight-chip warn" style="cursor:default">
    📉 Avaria total: <b>${(totalAv/totalVenda*100).toFixed(2)}%</b> do faturamento da Loja ${loja}
  </div>`);

  if (_filtroAtivo) chips.push(`<div class="chip-clear" onclick="limparFiltro()">✕ Limpar filtro</div>`);

  if (!chips.length) { box.style.display='none'; return; }
  box.style.display='flex';
  box.innerHTML = chips.join('');
}

// Filtra a tabela de listas por IDs de lista
function filtrarListas(chave, ids) {
  if (_filtroAtivo === chave) { limparFiltro(); return; }
  _filtroAtivo = chave;
  const filtradas = listas.filter(l => ids.includes(l.id));
  renderListasComDados(filtradas);
  renderInsights();
}

function limparFiltro() {
  _filtroAtivo = null;
  renderListas();
  renderInsights();
}

function msvClass(v) { return v>=20?'m-great':v>=12?'m-ok':v>=0?'m-warn':'m-bad'; }
function avClass(v)  { return v<=2?'av-ok':v<=5?'av-warn':'av-bad'; }

function renderListas() { renderListasComDados(listas, null); }

function renderListasComDados(lista, filtroMsg) {
  if (!lista.length) {
    document.getElementById('main-tbody').innerHTML=`<tr><td colspan="10" class="empty">${filtroMsg?'Nenhuma lista para estes fornecedores.':'Nenhuma lista encontrada.'}</td></tr>`;
    return;
  }
  // Para a barra de referência, pega o maior venda entre os fornecedores das listas
  const maxVenda = Math.max(...lista.map(r => {
    const s = dados.find(d => d.id === r.codFornec);
    return s?.venda || 0;
  }), 1);

  let html = '';
  lista.forEach((r, i) => {
    const s = dados.find(d => d.id === r.codFornec) || {}; // dados do fornecedor vinculado
    const sel = listaSelecionada?.id === r.id ? 'selected' : '';
    const compradorHtml = r.compradores
      ? r.compradores.split(', ').map(c=>`<span class="comp-tag">${c}</span>`).join(' ')
      : '<span style="color:#98A0B3;font-size:11px">—</span>';
    const venda  = s.venda  || 0;
    const avaria = s.avaria || 0;
    const pct    = (venda / maxVenda * 100).toFixed(1);
    const sid    = s.id;
    html += `<tr class="${sel}" id="row-${r.id}">
      <td class="rank">${i+1}</td>
      <td>
        <div class="nome-lista" onclick="abrirLista(${r.id})" title="Ver itens da lista">${r.nome}</div>
        <div style="font-size:11px;color:#4E5A72;margin-top:2px">${r.fornecedor||''}</div>
        <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
      </td>
      <td style="min-width:110px">${compradorHtml}</td>
      <td class="td-r"><span class="td-venda" onclick="${sid?`abrirDrawer(${sid},'venda')`:'void(0)'}" title="Ver detalhes de venda">${venda>0?fmt(venda):'—'}</span></td>
      <td class="td-r"><span class="td-margem ${msvClass(s.msv)}" onclick="${sid?`abrirDrawer(${sid},'margem')`:'void(0)'}" title="Ver rentabilidade">${venda>0?pctFmt(s.msv):'—'}</span></td>
      <td class="td-r"><span class="td-margem ${msvClass(s.msc)}" onclick="${sid?`abrirDrawer(${sid},'margem')`:'void(0)'}" title="Ver rentabilidade">${venda>0?pctFmt(s.msc):'—'}</span></td>
      <td class="td-r"><span class="td-avaria ${avClass(s.pct_av)}" onclick="${sid?`abrirDrawer(${sid},'avaria')`:'void(0)'}" title="Ver avarias">${avaria>0?fmt(avaria):'—'}</span></td>
      <td class="td-r ${avClass(s.pct_av)}">${avaria>0?pctFmt(s.pct_av):'—'}</td>
      <td class="td-r"><span class="itens-badge">${r.total_itens}</span></td>
      <td class="td-r" style="color:#4E5A72">${fmtN(s.com_venda||0)}</td>
    </tr>`;
  });
  document.getElementById('main-tbody').innerHTML = html;
}

// ─── DRAWER ─────────────────────────────────────
const TABS = [
  { id:'produtos', label:'📦 Produtos'    },
  { id:'venda',    label:'💰 Venda'       },
  { id:'margem',   label:'📊 Margem'      },
  { id:'avaria',   label:'⚠️ Avaria'      },
  { id:'lojas',    label:'🏪 Todas as Lojas'}
];

let tabAtiva = 'produtos';

async function abrirDrawer(id, tab) {
  const f = dados.find(r=>r.id===id);
  if (!f) return;
  fornecSelecionado = f;
  tabAtiva = tab;

  const { loja, mes, ano } = params();
  document.getElementById('d-title').textContent = f.nome;
  document.getElementById('d-subtitle').textContent = `Loja ${loja} · ${mesesNomes[+mes]} ${ano}`;

  // Tabs
  document.getElementById('d-tabs').innerHTML = TABS.map(t =>
    `<button class="dtab ${t.id===tab?'active':''}" onclick="mudarTab('${t.id}')">${t.label}</button>`
  ).join('');

  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('main').classList.add('drawer-open');

  await renderTab(tab);
}

async function mudarTab(tab) {
  tabAtiva = tab;
  document.querySelectorAll('.dtab').forEach(b=>b.classList.toggle('active', b.textContent.includes(TABS.find(t=>t.id===tab)?.label?.slice(2)||tab)));
  document.getElementById('d-tabs').querySelectorAll('.dtab').forEach(b=>{
    b.classList.remove('active');
    if (b.onclick.toString().includes(`'${tab}'`)) b.classList.add('active');
  });
  await renderTab(tab);
}

async function renderTab(tab) {
  const body = document.getElementById('d-body');
  body.innerHTML = '<div class="spinner"></div>';
  const { loja, mes, ano } = params();
  const id = fornecSelecionado.id;

  if      (tab==='produtos') await renderProds(id, loja, mes, ano, body);
  else if (tab==='venda')    await renderVenda(id, loja, mes, ano, body);
  else if (tab==='margem')   await renderMargemTab(id, loja, mes, ano, body);
  else if (tab==='avaria')   await renderAvaria(id, loja, mes, ano, body);
  else if (tab==='lojas')    await renderLojas(id, mes, ano, body);
}

async function getProdos(id, loja, mes, ano) {
  const key = `${id}-${loja}-${mes}-${ano}`;
  if (!cacheProds[key]) {
    const r = await fetch(`/api/fornecedores/${id}/produtos?loja=${loja}&mes=${mes}&ano=${ano}`);
    cacheProds[key] = await r.json();
  }
  return cacheProds[key];
}
async function getAvaria(id, loja, mes, ano) {
  const key = `${id}-${loja}-${mes}-${ano}`;
  if (!cacheAvaria[key]) {
    const r = await fetch(`/api/fornecedores/${id}/avarias?loja=${loja}&mes=${mes}&ano=${ano}`);
    cacheAvaria[key] = await r.json();
  }
  return cacheAvaria[key];
}
async function getLojas(id, mes, ano) {
  const key = `${id}-${mes}-${ano}`;
  if (!cacheLojas[key]) {
    const r = await fetch(`/api/fornecedores/${id}/lojas?mes=${mes}&ano=${ano}`);
    cacheLojas[key] = await r.json();
  }
  return cacheLojas[key];
}

// TAB PRODUTOS
async function renderProds(id, loja, mes, ano, body) {
  let prods;
  try { prods = await getProdos(id, loja, mes, ano); } catch(e){ body.innerHTML=`<div class="empty">Erro: ${e.message}</div>`; return; }
  if (!prods.length){ body.innerHTML='<div class="empty">Nenhum produto ativo neste fornecedor.</div>'; return; }

  let filtro = 'todos';
  function renderRows(f) {
    let lista = prods;
    if (f==='sem-giro')   lista = prods.filter(p=>!p.tem_venda);
    if (f==='est-baixo')  lista = prods.filter(p=>p.estoque<5&&p.estoque>=0);
    if (f==='est-alto')   lista = prods.filter(p=>p.estoque>200);
    if (f==='marg-neg')   lista = prods.filter(p=>p.msv!==null&&p.msv<0);
    const tbody = document.getElementById('dt-prods');
    if (!tbody) return;
    tbody.innerHTML = lista.map((p,i) => {
      const tags = [];
      if (!p.tem_venda) tags.push('<span class="tag-sem-giro">SEM GIRO</span>');
      if (p.estoque < 5) tags.push('<span class="tag-est-baixo">EST.BAIXO</span>');
      if (p.msv !== null && p.msv < 0) tags.push('<span class="tag-neg">MARG.NEG</span>');
      const msvC = p.msv===null?'':'<span class="'+msvClass(p.msv)+'">'+pctFmt(p.msv)+'</span>';
      return `<tr>
        <td class="cod">${p.codigo}</td>
        <td class="desc">${p.descricao}${tags.join('')}</td>
        <td class="r" style="color:#4E5A72">${fmtN(p.estoque)}</td>
        <td class="r">${p.tem_venda?fmt(p.venda):'—'}</td>
        <td class="r">${msvC}</td>
        <td class="r" style="color:#4E5A72;font-size:10px">${p.ultima_compra||'—'}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="6" class="empty">Nenhum produto neste filtro.</td></tr>';
  }

  const semGiro  = prods.filter(p=>!p.tem_venda).length;
  const mNeg     = prods.filter(p=>p.msv!==null&&p.msv<0).length;
  const estBaixo = prods.filter(p=>p.estoque<5).length;

      <button class="qf-btn" onclick="filtrarProds('est-baixo',this)">Est. Baixo (${estBaixo})</button>

          <th class="r">Estoque</th><th class="r">Venda Mês</th>

          <th class="r">Venda R$</th>
          <th class="r">% do Total</th>

              <td class="desc">
                ${p.descricao}

async function renderMargemTab(id, loja, mes, ano, body) {

      <table class="d-t">

          <th class="r">Venda</th>
          <th class="r">Custo Total</th>
          <th class="r">Lucro</th>
          <th class="r">MSV%</th>
          <th class="r">MSC%</th>
        </tr></thead>
        <tbody>
          ${comVenda.map(p=>{
            const msc  = p.custo_total>0 ? p.lucro/p.custo_total*100 : null;

            const neg  = p.msv!==null&&p.msv<0;
            return `<tr ${neg?'style="background:#FBEAED22"':''}>
              <td class="desc">${p.descricao}${neg?'<span class="tag-neg" style="margin-left:4px">NEG</span>':''}</td>

              <td class="r"><span class="${msvC}">${p.msv!==null?pctFmt(p.msv):'—'}</span></td>
              <td class="r"><span class="${msvClass(msc)}">${msc!==null?pctFmt(msc):'—'}</span></td>

          }).join('')}
        </tbody>
      </table>

}

async function renderLojas(id, mes, ano, body) {
  let lojas;
  try { lojas = await getLojas(id, mes, ano); } catch(e){ body.innerHTML=`<div class="empty">Erro: ${e.message}</div>`; return; }
  const maxV = Math.max(...lojas.map(r=>r.venda), 1);

  const totalV = lojas.reduce((s,r)=>s+r.venda,0);
  const totalAv = lojas.reduce((s,r)=>s+r.avaria,0);
  const totalL  = lojas.reduce((s,r)=>s+r.lucro,0);

  let html = `
    <div class="d-kpis">
      <div class="d-kpi"><div class="dv" style="color:#0E1626">${fmt(totalV)}</div><div class="dl">Venda Total (Rede)</div></div>
      <div class="d-kpi"><div class="dv" style="color:#0E1626">${fmt(totalL)}</div><div class="dl">Lucro Bruto (Rede)</div></div>
      <div class="d-kpi"><div class="dv" style="color:#C22F49">${fmt(totalAv)}</div><div class="dl">Avaria Total (Rede)</div></div>
    </div>
    <div class="d-section" style="padding:0">`;

  lojas.forEach(r => {
    const pct = (r.venda/maxV*100).toFixed(1);
    const badges = [];
    if (r.badge_venda)  badges.push('<span class="badge-loja bl-gold">🥇 Maior Venda</span>');
    if (r.badge_msv)    badges.push('<span class="badge-loja bl-green">📈 Melhor Margem</span>');
    if (r.badge_avaria) badges.push('<span class="badge-loja bl-blue">✅ Menor Avaria</span>');
    html += `<div class="loja-row">
      <div class="loja-label">Loja ${r.loja}</div>
      <div class="loja-bar-wrap"><div class="loja-bar-fill" style="width:${pct}%"></div></div>
      <div class="loja-val">${r.venda>0?fmt(r.venda):'—'}</div>

      <div style="min-width:160px">${badges.join('')}</div>
    </div>`;
  });
  html += '</div>';
  body.innerHTML = html;
}

async function abrirLista(id) {
  const lista = listas.find(r => r.id === id);
  if (!lista) return;
  listaSelecionada = lista;

  document.querySelectorAll('.main-t tbody tr').forEach(tr => tr.classList.remove('selected'));
  const row = document.getElementById('row-' + id);
  if (row) row.classList.add('selected');

  const { loja } = params();
  document.getElementById('d-title').textContent = lista.nome;
  document.getElementById('d-subtitle').textContent = `${lista.fornecedor||''} · ${lista.total_itens} itens`;
  document.getElementById('d-tabs').innerHTML = '';
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('main').classList.add('drawer-open');

  const body = document.getElementById('d-body');
  body.innerHTML = '<div class="spinner"></div>';

  try {
    const r = await fetch(`/api/listas-compra/${id}/itens?loja=${loja}`);
    const itens = await r.json();
    if (itens.error) throw new Error(itens.error);

    if (!itens.length) {
      body.innerHTML = '<div class="empty">Nenhum item ativo nesta lista para a loja selecionada.</div>';
      return;
    }

    const kpiHtml = `
      <div class="d-kpis">
        <div class="d-kpi"><div class="dv">${itens.length}</div><div class="dl">Itens na Lista</div></div>
        ${lista.compradores ? `<div class="d-kpi"><div class="dv" style="font-size:12px;color:#6B4E00">${lista.compradores}</div><div class="dl">Comprador(es)</div></div>` : ''}
        ${lista.obs ? `<div class="d-kpi"><div class="dv" style="font-size:11px;color:#4E5A72">${lista.obs}</div><div class="dl">Observação</div></div>` : ''}
        ${lista.lojas.length ? `<div class="d-kpi"><div class="dv">${lista.lojas.map(n=>`<span class="loja-badge">L${n}</span>`).join('')}</div><div class="dl">Lojas</div></div>` : ''}
      </div>`;

    const rows = itens.map(it => `<tr>
      <td class="cod">${it.codigo}</td>
      <td class="desc">${it.descricao||'—'}</td>
      <td class="r" style="color:#4E5A72">${it.unidade||''}</td>
      <td class="r" style="color:#4E5A72">${it.embalagem||1}</td>
      <td class="r" style="color:#B45C00">${it.custo > 0 ? fmt(it.custo) : '—'}</td>
      <td>${it.lojas.map(n=>`<span class="loja-badge">L${n}</span>`).join('')}</td>
    </tr>`).join('');

    body.innerHTML = kpiHtml + `
      <div class="d-table-wrap">
        <table class="d-t">
          <thead><tr>
            <th>Código</th><th>Produto</th>
            <th class="r">Unid</th><th class="r">Emb</th>
            <th class="r">Custo</th><th>Lojas</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  } catch(e) {
    body.innerHTML = `<div class="empty">Erro: ${e.message}</div>`;
  }
}

      html += '<tr style="border-bottom:1px solid #EAEBE3;' + (i%2===0?'background:#0a1628':'') + '">' +
        '<td style="font-size:11px;color:#0E1626;padding:4px 6px">' + it.Descricao + '</td>' +
        '<td style="font-size:10px;color:#98A0B3;padding:4px 6px">' + it.CodigoBarra + '</td>' +
        '<td style="font-size:11px;color:#4E5A72;padding:4px 6px;text-align:right">' + it.Qtd.toLocaleString('pt-BR') + '</td>' +
        '<td style="font-size:11px;color:#6B4E00;padding:4px 6px;text-align:right">' + it.Total.toLocaleString('pt-BR',{minimumFractionDigits:2}) + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('modal-produtos-body').innerHTML = html;
  } catch(e) {
    document.getElementById('modal-produtos-body').innerHTML = '<div style="color:#C22F49;padding:20px">Erro: ' + e.message + '</div>';
  }
}

async function carregarCompras() {
  const p = params();
  const key = `${p.loja}-${p.mes}-${p.ano}`;
  if (_comprasCache && _comprasCacheKey === key) { renderCompras(_comprasCache); return; }

  document.getElementById('comp-cards').innerHTML = '<div class="spinner"></div>';
  document.getElementById('compras-kpi').innerHTML = '';

  try {
    const r = await fetch(`/api/fornecedores/compras-resumo?loja=${p.loja}&mes=${p.mes}&ano=${p.ano}`);
    if (r.status === 401) { location.href = '/login.html'; return; }
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    _comprasCache = data; _comprasCacheKey = key;
    renderCompras(data);
  } catch (e) {
    document.getElementById('comp-cards').innerHTML = `<div class="empty">Erro ao carregar: ${e.message}</div>`;
  }
}

function renderCompras(data) {
  const p = params();
  const lojaNome = `Loja ${p.loja}`;
  const mesNome  = mesesNomes[+p.mes];

  // KPIs
  const compradoresAtivos = data.por_comprador.filter(c => c.comprador !== 'SEM COMPRADOR');
  const totalFornec = compradoresAtivos.reduce((s,c) => s + c.total, 0);
  const semFornec   = data.por_comprador.find(c => c.comprador === 'SEM COMPRADOR');
  const tv = data.total_venda || 0;
  const pctCompraVenda = tv > 0 ? (data.total / tv * 100).toFixed(1) : '—';

  // Top 5 compradores (já ordenados por total desc no servidor)
  const top5 = compradoresAtivos.slice(0, 5);
  const totalTop5 = top5.reduce((s,c) => s + c.total, 0);
  const pctTop5Venda = tv > 0 ? (totalTop5 / tv * 100).toFixed(1) : null;
  const pctSemVenda  = (tv > 0 && semFornec) ? (semFornec.total / tv * 100).toFixed(1) : null;

  const pctColor = parseFloat(pctCompraVenda) > 100 ? '#C22F49' : parseFloat(pctCompraVenda) > 85 ? '#F5B800' : '#137A48';
  const hAtraso = data.venda_horas_atraso;
  const atrasoLabel = hAtraso != null
    ? (hAtraso < 2 ? ' · atualizado agora' : ' · ' + hAtraso + 'h atrás ⚠')
    : '';
  const kpiVenda = tv > 0
    ? '<div class="kpi"><div class="v" style="color:#0E1626">' + fmt(tv) + '</div><div class="l">Total Venda · ' + mesNome + atrasoLabel + '</div></div>'
    : '';
  const kpiRatio = tv > 0
    ? '<div class="kpi"><div class="v" style="color:' + pctColor + '">' + pctCompraVenda + '%</div><div class="l">Compra / Venda · R$ ' + ((data.total/tv)*1000|0)/10 + ' centavos p/ R$1 vendido</div></div>'
    : '';
  const kpiTop5 = pctTop5Venda !== null
    ? '<div class="kpi"><div class="v" style="color:#137A48">' + pctTop5Venda + '%</div><div class="l">Top ' + top5.length + ' compradores s/venda · ' + fmt(totalTop5) + '</div></div>'
    : '';
  const kpiSemVenda = pctSemVenda !== null
    ? '<div class="kpi"><div class="v" style="color:#C22F49">' + pctSemVenda + '%</div><div class="l">Sem comprador s/venda · ' + fmt(semFornec.total) + '</div></div>'
    : (semFornec ? '<div class="kpi"><div class="v" style="color:#C22F49">' + fmt(semFornec.total) + '</div><div class="l">Sem comprador</div></div>' : '');

  document.getElementById('compras-kpi').innerHTML =
    '<div class="kpi"><div class="v">' + fmt(data.total) + '</div><div class="l">Total Comprado · ' + lojaNome + ' · ' + mesNome + '</div></div>' +
    kpiVenda +
    kpiRatio +
    '<div class="kpi"><div class="v" style="color:#0E1626">' + compradoresAtivos.length + '</div><div class="l">Compradores ativos</div></div>' +
    kpiTop5 +
    kpiSemVenda;

  // Cards
  const compradores = data.por_comprador.filter(c => c.comprador !== 'SEM COMPRADOR');
  const semComp     = data.por_comprador.filter(c => c.comprador === 'SEM COMPRADOR');
  const todos       = [...compradores, ...semComp];

  const thVenda = tv > 0 ? '<th class="r">% Venda</th>' : '';
  const html = todos.map(function(c, idx) {
    const cor      = c.comprador === 'SEM COMPRADOR' ? '#4E5A72' : COMP_CORES[idx % COMP_CORES.length];
    const qtdNfs   = c.fornecedores.reduce(function(s,f){ return s + f.qtd_nfs; }, 0);
    const pctVenda = tv > 0 ? (c.total / tv * 100).toFixed(1) : null;
    const spanVenda = pctVenda !== null
      ? '<span class="comp-pct" style="color:#0E1626;margin-left:6px">' + pctVenda + '% s/venda</span>'
      : '';
    const itemVenda = pctVenda !== null
      ? '<div class="comp-resumo-item">% s/venda: <span style="color:#0E1626">' + pctVenda + '%</span></div>'
      : '';

    const isSemComp = c.comprador === 'SEM COMPRADOR';
    const comLista  = isSemComp ? c.fornecedores.filter(function(f){ return f.listas.length > 0; }) : [];
    const alertaLista = (isSemComp && comLista.length > 0)
      ? '<div style="margin:6px 14px 0;padding:6px 10px;background:#FBEDDD;border:1px solid #92400e;border-radius:6px;font-size:11px;color:#B45C00">' +
          '⚠️ ' + comLista.length + ' fornecedor(es) têm lista de compra mas estão sem comprador: ' +
          comLista.map(function(f){ return '<b>' + f.nome + '</b> (Cód.' + f.id + ')'; }).join(', ') +
        '</div>'
      : '';

    const rows = c.fornecedores.map(function(f, fi) {
      const temLista = f.temLista || f.listas.length > 0;
      const listaTag = temLista
        ? f.listas.map(function(lid){ return '<span style="display:inline-block;background:#0E1626;color:#0E1626;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:3px;cursor:pointer" onclick="abrirFornecedorPorId(' + f.id + ')">Lista #' + lid + '</span>'; }).join('')
        : '<span style="font-size:9px;color:#D8D9CF">sem lista</span>';
      const alertaSem = (isSemComp && temLista)
        ? '<span style="font-size:9px;background:#7c2d12;color:#C22F49;padding:1px 5px;border-radius:3px;margin-left:4px">tem lista</span>'
        : '';
      const pctCompra = data.total > 0 ? (f.total/data.total*100).toFixed(1) : 0;
      const tdVenda = tv > 0
        ? '<td class="r" style="color:#0E1626">' + (f.total/tv*100).toFixed(1) + '% <span style="font-size:9px;color:#98A0B3">s/venda</span></td>'
        : '';
      const trBg = isSemComp && temLista ? 'background:#1c0a00;' : '';
      return '<tr style="' + trBg + 'cursor:pointer" onclick="verProdutosFornec(' + f.id + ',\'' + f.nome.replace(/'/g,"\\'") + '\',' + p.loja + ',' + p.mes + ',' + p.ano + ')">' +
        '<td style="color:#4E5A72;font-size:10px">' + (fi+1) + '</td>' +
        '<td>' +
          '<div style="font-weight:600;color:#0E1626">' + f.nome + alertaSem + '</div>' +
          '<div style="margin-top:2px">' +
            '<span style="font-size:9px;color:#98A0B3;margin-right:6px">Cód. ' + f.id + '</span>' +
            listaTag +
          '</div>' +
        '</td>' +
        '<td class="r" style="color:#4E5A72">' + f.qtd_nfs + ' NF' + (f.qtd_nfs !== 1 ? 's' : '') + '</td>' +
        '<td class="r" style="color:#6B4E00;font-weight:700">' + fmt(f.total) + '</td>' +
        '<td class="r" style="color:#4E5A72">' + pctCompra + '%</td>' +
        tdVenda +
        '</tr>';
    }).join('');

    return '<div class="comp-card" id="cc-' + idx + '">' +
      '<div class="comp-card-hdr" onclick="toggleCard(\'cc-' + idx + '\')">' +
        '<div class="comp-dot" style="background:' + cor + '"></div>' +
        '<div class="comp-nome">' + c.comprador + '</div>' +
        '<div class="comp-bar-wrap"><div class="comp-bar-fill" style="width:' + c.pct + '%;background:' + cor + '"></div></div>' +
        '<div>' +
          '<span class="comp-total">' + fmt(c.total) + '</span>' +
          '<span class="comp-pct">' + c.pct + '% s/compra</span>' +
          spanVenda +
        '</div>' +
        '<div style="font-size:11px;color:#98A0B3;margin:0 4px">' + c.fornecedores.length + ' fornec · ' + qtdNfs + ' NFs</div>' +
        '<div class="comp-chev">▼</div>' +
      '</div>' +
      '<div class="comp-body">' +
        '<div class="comp-resumo">' +
          '<div class="comp-resumo-item">Fornecedores: <span>' + c.fornecedores.length + '</span></div>' +
          '<div class="comp-resumo-item">NFs recebidas: <span>' + qtdNfs + '</span></div>' +
          '<div class="comp-resumo-item">Total comprado: <span>' + fmt(c.total) + '</span></div>' +
          '<div class="comp-resumo-item">% s/compras: <span>' + c.pct + '%</span></div>' +
          itemVenda +
        '</div>' +
        alertaLista +
        '<div class="comp-table-wrap">' +
          '<table class="comp-t">' +
            '<thead><tr><th>#</th><th>Fornecedor · Cód · Lista</th><th class="r">NFs</th><th class="r">Comprado R$</th><th class="r">% Compra</th>' + thVenda + '</tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('comp-cards').innerHTML = html || '<div class="empty">Nenhuma compra encontrada no período.</div>';
}

function toggleCard(id) {
  document.getElementById(id).classList.toggle('open');
}

async function abrirFornecedorPorId(id) {
  if (!dados || !dados.find) return;
  if (!dados.find(r => r.id === id)) {
    await carregar();
  }
  abrirDrawer(id, 'produtos');
}

    </div>
    <div class="kpis">${kpis}</div>

carregar();
